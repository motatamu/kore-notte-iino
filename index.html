<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>これ乗っていいの？ – 名古屋市バス</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css">
<script src="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>
<style>
  @font-face{font-family:'PM10'; src:url('PixelMplus10-Regular.ttf') format('truetype');}
  @font-face{font-family:'PM12'; src:url('PixelMplus12-Regular.ttf') format('truetype');}
  :root{
    --blue:#1a6fd4; --green:#0d7a4f; --green-bg:#e3f4ec;
    --red:#c0392b; --red-bg:#fdecea; --ink:#1b1b1b; --muted:#666;
    --led:#ebebe3; --card:#fff; --bg:#f2f1ec;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--ink);
       font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif; font-size:20px; line-height:1.6;}
  .wrap{max-width:520px; margin:0 auto; padding:16px 14px 60px;}
  h1{font-size:22px; margin:8px 0 2px; text-align:center;}
  .sub{text-align:center; color:var(--muted); font-size:13px; margin:0 0 10px;}
  #langbar{text-align:center; margin-bottom:14px;}
  #langbar select{font-size:16px; padding:6px 10px; border:1px solid #ccc; border-radius:10px; background:#fff;}
  .card{background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px;
        box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .label{font-size:16px; color:var(--muted); margin-bottom:6px;}
  .bigval{font-size:28px; font-weight:700;}
  input[type=text]{width:100%; font-size:22px; padding:12px; border:2px solid #ccc; border-radius:10px;}
  input[type=text]:focus{border-color:var(--blue); outline:none;}
  .btn{display:block; width:100%; font-size:22px; font-weight:700; padding:14px;
       border:none; border-radius:12px; cursor:pointer; margin-top:10px;}
  .btn-blue{background:var(--blue); color:#fff;}
  .btn-gray{background:#e5e3dc; color:var(--ink); font-weight:500; font-size:16px; padding:10px;}
  .suggest{margin-top:6px;}
  .suggest button{display:block; width:100%; text-align:left; font-size:21px; padding:12px;
       background:#fff; border:1px solid #ddd; border-radius:10px; margin-top:6px; cursor:pointer;}
  .suggest button:active{background:#eef4fd;}
  .led{background:#141414; border:4px solid #3a3a3a; border-radius:12px; padding:10px;
       display:flex; align-items:stretch; gap:10px; min-height:86px;
       background-image:radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1.6px);
       background-size:5px 5px;}
  .lroute{border:2.5px solid var(--led); border-radius:4px; padding:2px 8px; text-align:center; line-height:1.1; flex-shrink:0;
          display:flex; align-items:center; justify-content:center; gap:3px; align-self:stretch;}
  .lroute.stack{flex-direction:column; gap:0;}
  .lroute .k{font-size:17px;}
  .lroute .n{font-size:30px;}
  .lroute .row2{display:flex; align-items:center; gap:3px;}
  .kanbox{border:1.5px solid var(--led); border-radius:3px; font-size:13px; padding:0 3px; line-height:1.3;}
  .lmain{flex:1; text-align:center; min-width:0; display:flex; flex-direction:column; justify-content:center;}
  .ltop{font-size:16px; letter-spacing:.35em;}
  .lvia{font-size:18px; letter-spacing:.02em;}
  .ldest{font-size:38px; letter-spacing:.06em;}
  .lromaji{font-size:15px; margin-top:2px; font-weight:700; text-align:right; padding-right:8px;}
  .lroute,.kanbox,.ltop,.lvia,.ldest,.lromaji{color:var(--led); font-family:"Hiragino Kaku Gothic Std","Yu Gothic",sans-serif; font-weight:800;}
  .ok-title{color:var(--green); font-weight:700; font-size:18px; margin:14px 0 6px;}
  .ng-title{color:var(--red); font-weight:700; font-size:18px; margin:14px 0 6px;}
  .buslist{border-radius:10px; padding:8px 12px; font-size:20px;}
  .buslist.ok{background:var(--green-bg);} .buslist.ng{background:var(--red-bg);}
  .buslist div{padding:6px 0; border-bottom:1px dashed rgba(0,0,0,.12);}
  .buslist div:last-child{border-bottom:none;}
  .t{display:inline-block; min-width:64px; font-weight:700; font-variant-numeric:tabular-nums;}
  .rt{display:inline-block; background:#fff; border:1px solid #bbb; border-radius:6px;
      padding:0 6px; font-size:15px; margin-right:6px;}
  .warn{background:#fff5d6; border:2px solid #e5b100; border-radius:12px; padding:14px; font-size:19px; font-weight:700;}
  .move{font-size:26px; color:var(--blue);}
  .pill{display:inline-block; border-radius:20px; padding:2px 12px; font-size:15px; font-weight:700;}
  .pill.ok{background:var(--green-bg); color:var(--green);} .pill.ng{background:var(--red-bg); color:var(--red);}
  .small{font-size:14px; color:var(--muted);}
  .step{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .stepnum{background:var(--blue); color:#fff; border-radius:50%; width:28px; height:28px;
      display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0;}
  a.link{color:var(--blue);}
  footer{margin-top:24px; text-align:center;}
  /* 降車ナビ（乗車後の「あと○駅」画面） */
  #rideview{display:none; position:fixed; inset:0; background:var(--bg); z-index:1000; overflow:auto;}
  .ridewrap{max-width:520px; margin:0 auto; padding:24px 16px 40px;}
  .ridebignum{text-align:center; font-size:32px; font-weight:700; margin:6px 0;}
  .ridenum{font-size:104px; font-weight:800; color:var(--blue); line-height:1.05; display:inline-block; min-width:1.1em; font-variant-numeric:tabular-nums;}
  .ridenext{background:var(--card); border-radius:16px; padding:14px; margin:12px 0; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .ridenextname{font-size:32px; font-weight:700;}
  .ridedest{background:var(--card); border-radius:16px; padding:12px 14px; margin:12px 0; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .ridearr{background:var(--green-bg); color:var(--green); border-radius:16px; padding:24px 16px; font-size:28px; font-weight:800; text-align:center; margin:12px 0;}
  .ridearr.soon{background:#fff5d6; color:#8a6100;}
</style>
</head>
<body>
<div class="wrap">
  <h1><span id="busIcon">🚌</span> これ乗っていいの？</h1>
  <p class="sub" id="sub">名古屋市バス版プロトタイプ</p>
  <div id="langbar"></div>

  <div class="card" id="cardDest">
    <div class="step"><div class="stepnum">1</div><div class="label" style="margin:0" id="lblStep1">降りたいバス停（目的地）</div></div>
    <div id="destShow" style="display:none">
      <span class="bigval" id="destName"></span>
      <button class="btn btn-gray chg" onclick="resetDest()">変更する</button>
    </div>
    <div id="destPick">
      <input type="text" id="destInput" placeholder="例：四軒家" oninput="suggest('dest')">
      <div class="suggest" id="destSug"></div>
    </div>
  </div>

  <div class="card" id="cardHere">
    <div class="step"><div class="stepnum">2</div><div class="label" style="margin:0" id="lblStep2">いまいるバス停</div></div>
    <div id="hereShow" style="display:none">
      <span class="bigval" id="hereName"></span>
      <button class="btn btn-gray chg" onclick="resetHere()">変更する</button>
    </div>
    <div id="herePick">
      <button class="btn btn-blue" id="btnGps" onclick="useGPS()">📍 いまの場所からさがす</button>
      <div class="small" style="text-align:center; margin:8px 0 4px" id="lblOr">または名前でさがす</div>
      <input type="text" id="hereInput" placeholder="例：守山プール" oninput="suggest('here')">
      <div class="suggest" id="hereSug"></div>
      <div class="small" id="gpsMsg"></div>
    </div>
  </div>

  <div id="result"></div>

  <footer class="small">
    出典：名古屋市交通局「市バスGTFS-JPデータ」(CC BY 4.0) 2026年3月28日改正<br>
    <span id="footNote">時刻表ベースの案内です。遅延には対応していません（プロトタイプ v3.32）。</span>
  </footer>
</div>
<div id="rideview"></div>

if(!I18N[lang]) lang='ja';
function t(k){
  let s=(I18N[lang]&&I18N[lang][k]!==undefined)?I18N[lang][k]:I18N.ja[k];
  for(let i=1;i<arguments.length;i++){ s=s.split('{'+(i-1)+'}').join(arguments[i]); }
  return s;
}

}
function enOf(name){ return (GD.en&&GD.en[name])||''; }

// ================== データ索引 ==================
const nameToPoles = {};
GD.stops.forEach((s,i)=>{ (nameToPoles[s[0]] = nameToPoles[s[0]]||[]).push(i); });
const stopNames = Object.keys(nameToPoles);

const poleTrips = {};
GD.trips.forEach((t2,ti)=>{ GD.patterns[t2[1]].forEach(si=>{ (poleTrips[si]=poleTrips[si]||new Set()).add(ti); }); });

let dest = localStorage.getItem('dest') || null;
let here = null;
let myPos = null;
let nearestPole = null;
let walkMin = 0;

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ================== 検索（漢字・ひらがな・カタカナ・ローマ字・あいまい） ==================
function toHira(s){ return s.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)); }
function fuzzy(q){
  const qs=[...q], qh=[...toHira(q)];
  return stopNames.map(n=>{
    const ns=[...n], ys=[...(GD.yomi[n]||'')];
    let c=0; qs.forEach(ch=>{ if(ns.includes(ch)) c++; });
    let cy=0; qh.forEach(ch=>{ if(ys.includes(ch)) cy++; });
    let cm=0; qh.forEach(ch=>{ if(ns.includes(ch)||ys.includes(ch)) cm++; });
    const sc=Math.max(c/Math.max(qs.length,ns.length), ys.length?cy/Math.max(qh.length,ys.length):0, cm/qh.length*0.9);
    return {n, sc};
  }).filter(x=>x.sc>=0.5).sort((a,b)=>b.sc-a.sc).slice(0,5).map(x=>x.n);
}
function suggest(kind){
  const q = document.getElementById(kind+'Input').value.trim();
  const box = document.getElementById(kind+'Sug');
  box.innerHTML='';
  if(q.length<1) return;
  const qh = toHira(q), ql = q.toLowerCase();
  let hits = stopNames.filter(n=> n.includes(q) || (GD.yomi[n]||'').includes(qh) || enOf(n).toLowerCase().includes(ql) ).slice(0,8);
  if(hits.length===0 && q.length>=2){
    hits = fuzzy(q);
    if(hits.length){
      const note=document.createElement('div');
      note.className='small';
      note.textContent=t('notfound');
      box.appendChild(note);
    }
  }
  hits.forEach(n=>{
    const b=document.createElement('button');
    b.textContent=sn(n);
    b.onclick=()=>{ kind==='dest'?setDest(n):setHere(n,null); };
    box.appendChild(b);
  });
}
function setDest(n){ dest=n; localStorage.setItem('dest',n); render(); }
function resetDest(){ dest=null; localStorage.removeItem('dest'); render(); }
function setHere(n,pole){ here=n; nearestPole=pole; walkMin=0; render(); }
function resetHere(){ here=null; nearestPole=null; myPos=null; walkMin=0; render(); }
function goNearby(pi,w){ here=GD.stops[pi][0]; nearestPole=pi; walkMin=w; render(); window.scrollTo(0,0); }

// ================== 地理計算 ==================
function dist(la1,lo1,la2,lo2){
  const R=6371000, d=Math.PI/180;
  const a=Math.sin((la2-la1)*d/2)**2 + Math.cos(la1*d)*Math.cos(la2*d)*Math.sin((lo2-lo1)*d/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function bearing(la1,lo1,la2,lo2){
  const d=Math.PI/180;
  const y=Math.sin((lo2-lo1)*d)*Math.cos(la2*d);
  const x=Math.cos(la1*d)*Math.sin(la2*d)-Math.sin(la1*d)*Math.cos(la2*d)*Math.cos((lo2-lo1)*d);
  const deg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  return t('dirs')[Math.round(deg/45)%8];
}

function useGPS(){
  const msg=document.getElementById('gpsMsg');
  if(DEBUG_POS){ // デバッグ：?gps= のバス停に立っている設定
    myPos={lat:DEBUG_POS.lat, lon:DEBUG_POS.lon};
    let best=-1,bd=1e9;
    GD.stops.forEach((s,i)=>{ const dd=dist(myPos.lat,myPos.lon,s[1],s[2]); if(dd<bd){bd=dd;best=i;} });
    setHere(GD.stops[best][0], best);
    return;
  }
  msg.textContent=t('locating');
  navigator.geolocation.getCurrentPosition(p=>{
    myPos={lat:p.coords.latitude, lon:p.coords.longitude};
    let best=-1,bd=1e9;
    GD.stops.forEach((s,i)=>{ const dd=dist(myPos.lat,myPos.lon,s[1],s[2]); if(dd<bd){bd=dd;best=i;} });
    if(bd>800){ msg.textContent=t('nostop'); return; }
    setHere(GD.stops[best][0], best);
  }, e=>{ msg.textContent=t('noloc'); });
}

// ================== ダイヤ判定 ==================
function activeServices(dateObj){
  const y=dateObj.getFullYear(), m=('0'+(dateObj.getMonth()+1)).slice(-2), dd=('0'+dateObj.getDate()).slice(-2);
  const key=''+y+m+dd;
  const dow=(dateObj.getDay()+6)%7;
  const act=new Set();
  GD.calendar.forEach((days,i)=>{ if(days[dow]) act.add(i); });
  const ex=GD.calendarDates[key];
  if(ex){ ex.add.forEach(i=>act.add(i)); ex.del.forEach(i=>act.delete(i)); }
  return act;
}
function judge(poleIdx, destName, act, nowMin){
  const destSet=new Set(nameToPoles[destName]);
  const ok=[], ng=new Map();
  const set=poleTrips[poleIdx]; if(!set) return {ok,ng:[]};
  set.forEach(ti=>{
    const [r,p,s,h,times]=GD.trips[ti];
    if(!act.has(s)) return;
    const pat=GD.patterns[p];
    const i=pat.indexOf(poleIdx);
    if(i<0 || i===pat.length-1) { return; }
    const depart=times[i];
    if(depart<nowMin) return;
    let goes=false, arr=0;
    for(let k=i+1;k<pat.length;k++){ if(destSet.has(pat[k])){goes=true; arr=times[k]; break;} }
    // メーグルは乗車バス停ごとに公式の行先表記が変わる（MEGURU_HS。他系統はそのまま素通し）
    const rn=GD.routes[r], hn=meguruHS(rn, GD.headsigns[h], pat, i);
    if(goes) ok.push({t:depart, arr, r:rn, h:hn, ti:ti});
    else ng.set(rn+'|'+hn, {r:rn, h:hn});
  });
  ok.sort((a,b)=>a.t-b.t);
  return {ok, ng:[...ng.values()]};
}

function fmt(min){ let h=Math.floor(min/60); if(h>=24)h-=24; return ('0'+h).slice(-2)+':'+('0'+min%60).slice(-2); }
function parseHS(h){ const m=h.match(/^(.+?)（(.+)）$/); return m?{d:m[1],v:m[2]}:{d:h,v:''}; }
function poleLabel(i){ const pc=GD.stops[i][3]; return t('pole', pc||'?'); }
// 行先のローマ字（日本語以外のとき）
function romajiHS(hs){
  if(lang==='ja') return '';
  const ed=enOf(hs.d);
  if(!ed) return '';
  let ev='';
  if(hs.v){
    const vn=hs.v.replace(/経由.*$/,'').trim();
    const e2=enOf(vn);
    if(e2) ev=' '+t('via',e2);
  }
  return ed+ev;
}

// ================== 画面 ==================
function render(){
  window._rideCand=null; // 降車ナビ候補は毎回引き直す（古い便で案内しない）
  window._nextDep=null; // 「あと約○分」自動更新の基準（結果を表示していない時は動かさない）
  document.getElementById('destShow').style.display = dest?'block':'none';
  document.getElementById('destPick').style.display = dest?'none':'block';
  if(dest) document.getElementById('destName').textContent='🏁 '+sn(dest);
  document.getElementById('hereShow').style.display = here?'block':'none';
  document.getElementById('herePick').style.display = here?'none':'block';
  if(here) document.getElementById('hereName').textContent='📍 '+sn(here);
  document.getElementById('destSug').innerHTML=''; document.getElementById('hereSug').innerHTML='';
  const R=document.getElementById('result');
  R.innerHTML='';
  if(!dest||!here) return;
  if(dest===here){ R.innerHTML='<div class="card">'+t('same')+'</div>'; return; }

  const now=nowDate(); // 通常は現在時刻。デバッグ時のみ ?at= で固定
  const nowMin=now.getHours()*60+now.getMinutes()+walkMin;
  const act=activeServices(now);
  const poles=nameToPoles[here];
  let pendingLed=null;

  const verdicts=poles.map(pi=>({pi, ...judge(pi,dest,act,nowMin)}));
  const goodPoles=verdicts.filter(v=>v.ok.length>0);
  goodPoles.forEach(v=>{
    let bt=null;
    v.ok.forEach(b=>{ if(!bt || b.arr<bt.arr || (b.arr===bt.arr && b.t<bt.t)) bt=b; });
    v.best=bt;
  });
  goodPoles.sort((a,b)=> a.best.arr-b.best.arr || a.best.t-b.best.t);

  let html='';
  let mapSpec=null;

  if(goodPoles.length===0){
    html+='<div class="card"><div class="warn">'+t('nodirect', esc(sn(here)), esc(sn(dest)))+'</div>';
    let ref;
    if(myPos){ ref=[myPos.lat,myPos.lon]; }
    else { ref=[poles.reduce((a,i)=>a+GD.stops[i][1],0)/poles.length, poles.reduce((a,i)=>a+GD.stops[i][2],0)/poles.length]; }
    const cands=[];
    GD.stops.forEach((s,i)=>{
      if(s[0]===here) return;
      const dd=dist(ref[0],ref[1],s[1],s[2]);
      if(dd>800) return;
      const w=Math.ceil(dd/67);
      const v=judge(i,dest,act,nowMin+w);
      if(v.ok.length) cands.push({pi:i, dd:Math.round(dd), w, dep:v.ok[0].t});
    });
    if(cands.length){
      cands.sort((a,b)=>a.dd-b.dd);
      const seen=new Set(), top=[];
      cands.forEach(c=>{ const n=GD.stops[c.pi][0]; if(!seen.has(n)){seen.add(n); top.push(c);} });
      html+='<div class="label" style="margin-top:12px">'+t('walkable')+'</div><div class="suggest">';
      top.slice(0,3).forEach(c=>{
        const s=GD.stops[c.pi];
        const dir=bearing(ref[0],ref[1],s[1],s[2]);
        html+='<button onclick="goNearby('+c.pi+','+c.w+')">'+
          '<b>'+esc(sn(s[0]))+' '+poleLabel(c.pi)+'</b><span class="small" id="lm'+c.pi+'"></span><br>'+
          '<span class="small">'+t('towalk', dir, c.dd, c.w, fmt(c.dep))+'</span></button>';
      });
      html+='</div><div class="small" style="margin-top:6px">'+t('tapswitch')+'</div>';
      html+='<div id="lmap" style="height:280px; border-radius:10px; margin-top:10px"></div>';
      mapSpec={markers:top.slice(0,3).map(c=>{
        const s=GD.stops[c.pi];
        return {pi:c.pi, lat:s[1],lon:s[2],label:s[3]||'?',color:'#0d7a4f',
                popup:esc(sn(s[0]))+' '+poleLabel(c.pi)+'<br>'+t('pwalk',c.w)+'<br><a target="_blank" href="https://www.google.com/maps/dir/?api=1&destination='+s[1]+','+s[2]+'&travelmode=walking">'+t('pgmap')+'</a>'};
      }), user:[ref[0],ref[1]]};
    } else {
      html+='<div class="small" style="margin-top:8px">'+t('nowalk')+'</div>';
    }
    const ds=GD.stops[nameToPoles[dest][0]];
    const gm='https://www.google.com/maps/dir/?api=1&origin='+ref[0]+','+ref[1]+'&destination='+ds[1]+','+ds[2]+'&travelmode=transit';
    html+='<a class="btn btn-blue" style="display:block; text-decoration:none; text-align:center; margin-top:14px" target="_blank" href="'+gm+'">'+t('transfer')+'</a>';
    html+='<div class="small" style="text-align:center; margin-top:4px">'+t('transfernote', esc(sn(dest)))+'</div>';
    html+='</div>';
    R.innerHTML=html; drawMap(mapSpec);
    if(mapSpec) annotate(mapSpec.markers.map(mk=>mk.pi));
    return;
  }
  if(walkMin>0){
    html+='<div class="card"><div class="small">'+t('walknote', esc(sn(here)), walkMin)+'</div></div>';
  }

  if(poles.length>1){
    html+='<div class="card"><div class="label">'+t('polecare', esc(sn(here)), poles.length)+'</div>';
    let wrongPole = nearestPole!==null && !goodPoles.some(v=>v.pi===nearestPole) && poles.includes(nearestPole);
    goodPoles.forEach((v,vi)=>{
      const s=GD.stops[v.pi];
      html+='<div style="margin:10px 0; padding-bottom:8px; border-bottom:1px dashed #ddd">';
      html+='<span class="pill ok">◎ '+poleLabel(v.pi)+'</span>'+esc(t('waithere'));
      if(vi===0 && goodPoles.length>1) html+=' <span class="pill" style="background:#fff3cd; color:#8a6100">'+t('fastest')+'</span>';
      html+='<span class="small" id="lm'+v.pi+'"></span>';
      html+='<div style="font-size:17px; margin-top:2px">'+fmt(v.best.t)+' →「'+esc(sn(dest))+'」'+fmt(v.best.arr)+' <span class="small">['+esc(v.best.r)+'] '+esc(v.best.h)+'</span></div>';
      if(myPos){
        const dd=Math.round(dist(myPos.lat,myPos.lon,s[1],s[2]));
        if(dd>30) html+='<div class="move">'+t('gohere', bearing(myPos.lat,myPos.lon,s[1],s[2]), dd)+'</div>';
        else html+='<div class="move">'+t('okhere')+'</div>';
      }
      html+=' <a class="link small" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination='+s[1]+','+s[2]+'&travelmode=walking">'+t('gmapwalk')+'</a>';
      html+='</div>';
    });
    if(wrongPole){
      html='<div class="card"><div class="warn">'+t('wrongpole', poleLabel(nearestPole), esc(sn(dest)))+'</div></div>'+html;
    }
    verdicts.filter(v=>v.ok.length===0).forEach(v=>{
      html+='<div style="margin:6px 0"><span class="pill ng">✕ '+poleLabel(v.pi)+'</span> <span class="small">'+esc(t('notcome'))+'</span><span class="small" id="lm'+v.pi+'"></span></div>';
    });
    html+='<div id="lmap" style="height:280px; border-radius:10px; margin-top:10px"></div>';
    mapSpec={markers:poles.map(pi=>{
      const s=GD.stops[pi], ok=goodPoles.some(v=>v.pi===pi);
      return {pi:pi, lat:s[1],lon:s[2],label:s[3]||'?',color:ok?'#0d7a4f':'#c0392b',
              popup:esc(sn(s[0]))+' '+poleLabel(pi)+(ok?'<br><b style="color:#0d7a4f">'+t('pwait')+'</b>':'<br><b style="color:#c0392b">'+t('pnot')+'</b>')};
    }), user: myPos?[myPos.lat,myPos.lon]:null};
    html+='</div>';
  }

  const v0 = goodPoles[0];
  const next = v0.best;
  const hs=parseHS(next.h);
  const wait=next.t-nowMin;
  html+='<div class="card">';
  html+='<div class="label">'+t('face', poleLabel(v0.pi))+'</div>';
  // 実車の行先表示フォーマット再現：[系統番号ボックス] 経由・行先 ／ ローマ字（実車もローマ字を表示）
  // LEDはドットマトリクス描画（ジェネレーター方式）。canvasは描画後に挿入
  const ledRj=enOf(hs.d)||'';
  // ♿・ベビーカーマークは出さない：全車共通／車両個体の設備表示であって、
  // 「どのバスに乗るか」の判断材料ではないため（北村さん判断 2026-07-19。LED本体を広く使う）
  html+='<div class="led" id="ledbox"></div>';
  if(sideColsFor(next.r, next.h)){
    html+='<div id="sidebox" style="margin-top:8px"></div>';
  }
  // メーグル：乗車バス停から区間LEDを引く（キーはGTFSの元表記。next.hは公式表記に差し替え済みのため使わない）
  const trN=GD.trips[next.ti], patN=GD.patterns[trN[1]];
  const mgSpec=meguruLed(next.r, GD.headsigns[trN[3]], patN, patN.indexOf(v0.pi));
  pendingLed=[next.r, hs, ledRj, next.h, mgSpec];
  window._nextDep=next.t; // 毎分の自動更新（下のsetInterval）が参照
  html+='<div style="text-align:center; margin-top:8px">'+t('deparr', fmt(next.t), '<b class="waitmin">'+t('waitin',wait)+'</b>', esc(sn(dest)), fmt(next.arr))+'</div>';
  // 降車ナビ：この便に乗ったら押す（trip番号と乗車のりばを控えておく）
  window._rideCand={ti:next.ti, pole:v0.pi};
  html+='<button class="btn btn-blue" onclick="startRide()" style="margin-top:10px">'+t('rbtn')+'</button>';
  html+='<div class="small" style="text-align:center; margin-top:4px">'+t('rhint')+'</div>';
  if(v0.ok.length===1){
    html+='<div class="warn" style="margin-top:10px">'+t('lastbus')+'</div>';
  } else if(v0.ok.length<=3){
    html+='<div style="text-align:center; margin-top:6px; color:#8a6100; font-weight:700">'+t('fewleft', v0.ok.length-1)+'</div>';
  }
  const su=GD.stops[v0.pi][4];
  if(su){
    html+='<div class="small" style="text-align:center; margin-top:6px"><a class="link" target="_blank" href="https://map.kotsu.city.nagoya.jp/map/QR.jsp?from='+encodeURIComponent(su)+'">'+t('where')+'</a><br>'+t('wherenote', esc(next.r), esc(hs.d))+'</div>';
  }

  html+='<div class="ok-title">'+t('oklist')+'</div><div class="buslist ok">';
  v0.ok.slice(0,5).forEach(b=>{ const p=parseHS(b.h);
    const slower = v0.ok.some(y=>y.t>b.t && y.arr<b.arr);
    html+='<div><span class="t">'+fmt(b.t)+'</span><span class="rt">'+esc(b.r)+'</span>'+esc(p.d)+(p.v?' <span class="small">'+esc(p.v)+'</span>':'')
      +' <span class="small">'+t('arr', fmt(b.arr))+'</span>'
      +(slower?' <span class="pill ng" style="font-size:12px; padding:0 8px">'+t('slow')+'</span>':'')+'</div>'; });
  html+='</div>';

  if(v0.ng.length){
    html+='<div class="ng-title">'+t('nglist')+'</div><div class="buslist ng">';
    v0.ng.slice(0,6).forEach(b=>{ const p=parseHS(b.h);
      html+='<div><span class="rt">'+esc(b.r)+'</span>'+esc(p.d)+(p.v?' <span class="small">'+esc(p.v)+'</span>':'')+'</div>'; });
    html+='</div>';
  } else {
    html+='<div style="background:var(--green-bg); border-radius:10px; padding:10px 12px; margin-top:12px; font-size:17px">'+t('allok', poleLabel(v0.pi), esc(sn(dest)))+'</div>';
  }
  html+='</div>';

// ================== LEDドットマトリクス・ジェネレーター ==================
// 文字列→ビットマップ（高さhドット）。ブラウザのcanvasでレンダリングして2値化
// ドットの太さ：既定は自動調整（フォントの濃さを測って決定）。URLの ?th=3〜7 で手動上書き可
const DOT_TH=(function(){ try{ const v=parseInt(new URLSearchParams(location.search).get('th')); return (v>=2&&v<=8)?v:0; }catch(e){ return 0; } })();
function tbits(text, h, ls){
  // 3倍サイズで描き、3x3ブロックの点灯数で間引く（くっきりドット化）
  const S=3;
  const c=document.createElement('canvas');
  const font=(h*S)+'px "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif';
  let ctx=c.getContext('2d');
  ctx.font=font;
  let w=0;
  if(ls>0){ for(const ch of text){ w+=Math.ceil(ctx.measureText(ch).width)+ls*S; } w-=ls*S; }
  else w=Math.ceil(ctx.measureText(text).width);
  w=Math.max(w,1);
  c.width=w+S*2; c.height=h*S;
  ctx=c.getContext('2d');
  ctx.font=font; ctx.fillStyle='#fff'; ctx.textBaseline='alphabetic';
  const m=ctx.measureText(text);
  const asc=(m.actualBoundingBoxAscent!==undefined)?m.actualBoundingBoxAscent:h*S*0.8;
  const desc=(m.actualBoundingBoxDescent!==undefined)?m.actualBoundingBoxDescent:h*S*0.2;
  const y=Math.round(asc+(h*S-(asc+desc))/2);
  if(ls>0){ let x=0; for(const ch of text){ ctx.fillText(ch,x,y); x+=Math.ceil(ctx.measureText(ch).width)+ls*S; } }
  else ctx.fillText(text,0,y);
  const d=ctx.getImageData(0,0,c.width,c.height).data;
  const W2=Math.floor(c.width/S);
  // 1パス目：各ブロックの点灯サブピクセル数を数える
  const counts=[]; let sum=0, nz=0;
  for(let yy=0;yy<h;yy++){
    const row=[];
    for(let xx=0;xx<W2;xx++){
      let cnt=0;
      for(let dy=0;dy<S;dy++)for(let dx=0;dx<S;dx++){
        if(d[((yy*S+dy)*c.width+(xx*S+dx))*4]>128) cnt++;
      }
      row.push(cnt);
      if(cnt>0){ sum+=cnt; nz++; }
    }
    counts.push(row);
  }
  // しきい値の自動調整：フォントが太い端末ほど高く（較正：細字5.67→4.5、太字6.45→6.0）
  let th=DOT_TH;
  if(!th){
    const mean=nz? sum/nz : 5;
    th=Math.max(3, Math.min(7, Math.round(1.9*mean-6.3)));
  }
  const bits=[]; let maxx=0;
  for(let yy=0;yy<h;yy++){
    const row=[];
    for(let xx=0;xx<W2;xx++){
      const v=counts[yy][xx]>=th?1:0;
      row.push(v); if(v&&xx>maxx)maxx=xx;
    }
    bits.push(row);
  }
  return {h:h, w:maxx+1, bits:bits};
}

function rtext(text){
  const bits=[[],[],[],[],[],[],[]];
  for(const ch of text){
    if(ch===' '){ for(let y=0;y<7;y++){ bits[y].push(0,0,0); } continue; } // スペースは詰める
    const g=F57[ch]||F57[ch.toUpperCase&&ch.toUpperCase()]||F57[' '];
    for(let y=0;y<7;y++){
      for(let b=4;b>=0;b--) bits[y].push((g[y]>>b)&1);

function zenNum(s){ return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }
function scale2(r){

    const row=[];
    for(let x=0;x<r.w;x++){ row.push(r.bits[y][x], r.bits[y][x]); }
    bits.push(row); bits.push(row.slice());
  }

let pmUnit=0, pmFamily='', pm12=false; // pm12＝PixelMplus12も使える（VIA_TOP2段の行先を12ドットで大きく出すのに使う）
const PM_FORCE=(function(){ try{ return new URLSearchParams(location.search).get('pm'); }catch(e){ return null; } })();
const pmReady=(async()=>{
  if(PM_FORCE==='0') return; // ?pm=0 でドットフォント強制OFF
  try{ if(document.fonts&&document.fonts.load) await document.fonts.load('10px PM10','駅'); }catch(e){}
  if(document.fonts&&document.fonts.check&&document.fonts.check('10px PM10')){ pmUnit=10; pmFamily='PM10'; }
  else{
    try{ if(document.fonts&&document.fonts.load) await document.fonts.load('12px PM12','駅'); }catch(e){}
    if(document.fonts&&document.fonts.check&&document.fonts.check('12px PM12')){ pmUnit=12; pmFamily='PM12'; }
  }
  // 描画品質の自己検査：この端末でにじむならドットフォントをやめて従来方式へ
  // （基準：「田」のインク密度。カリカリ=0.50前後、にじみ=0.7超。?pm=1で検査スキップ）
  if(pmUnit && PM_FORCE!=='1'){
    try{
      const t=pmbits('田',0);
      let lit=0; t.bits.forEach(r=>r.forEach(v=>{ if(v)lit++; }));
      const density=lit/(Math.max(t.w,1)*pmUnit);
      if(density>0.62){ console.warn('PixelMplus描画がにじむ環境のため従来方式に切替 density='+density.toFixed(2)); pmUnit=0; pmFamily=''; }
    }catch(e){ pmUnit=0; pmFamily=''; }
  }
  // PM10が使える環境ではPM12も試す（2段表示の行先を12ドットで大きく出すため）
  if(pmUnit===10){
    try{ if(document.fonts&&document.fonts.load) await document.fonts.load('12px PM12','駅'); }catch(e){}
    if(document.fonts&&document.fonts.check&&document.fonts.check('12px PM12')) pm12=true;
  }
})();
function pmbits(text, ls, u2, fam2){ // u2/fam2指定で別サイズのPixelMplusも使える（例：12,'PM12'）
  // ドットフォントは1マス=1pxに揃う設計。基準線を整数ピクセルに置いてにじみを防ぐ
  const u=u2||pmUnit;
  const c=document.createElement('canvas');
  const font=u+'px '+(fam2||pmFamily);
  let ctx=c.getContext('2d');
  ctx.font=font;
  let w=0;
  if(ls>0){ for(const ch of text){ w+=Math.ceil(ctx.measureText(ch).width)+ls; } w-=ls; }
  else w=Math.ceil(ctx.measureText(text).width);
  w=Math.max(w,1);
  c.width=w+4; c.height=u+6;
  ctx=c.getContext('2d');
  ctx.font=font; ctx.fillStyle='#fff'; ctx.textBaseline='alphabetic';
  if(ctx.fontKerning!==undefined) ctx.fontKerning='none';
  const mm=ctx.measureText(text);
  const asc=Math.ceil((mm.actualBoundingBoxAscent!==undefined)?mm.actualBoundingBoxAscent:u*0.85);
  const by=asc+2; // 整数ベースライン
  // Windowsは字送りが小数ピクセルになり横ににじむ→1文字ずつ整数位置に描く
  { let x=0; for(const ch of text){ ctx.fillText(ch,x,by); x+=Math.round(ctx.measureText(ch).width)+(ls||0); } }
  const d=ctx.getImageData(0,0,c.width,c.height).data;
  const lit=(xx,yy)=>d[(yy*c.width+xx)*4]>128;
  // 実際に点灯した行の範囲を検出して高さuに切り出す
  let r0=-1,r1=-1;
  for(let yy=0;yy<c.height;yy++){
    let any=false;
    for(let xx=0;xx<c.width;xx++){ if(lit(xx,yy)){any=true;break;} }
    if(any){ if(r0<0)r0=yy; r1=yy; }
  }
  if(r0<0){ return {h:u,w:1,bits:Array.from({length:u},()=>[0])}; }
  const gh=r1-r0+1;
  const start=(gh<=u)? r0-Math.floor((u-gh)/2) : r0;
  const bits=[]; let maxx=0;
  for(let yy=0;yy<u;yy++){
    const sy=start+yy;
    const row=[];
    for(let xx=0;xx<c.width;xx++){
      const v=(sy>=0&&sy<c.height&&lit(xx,sy))?1:0;
      row.push(v); if(v&&xx>maxx)maxx=xx;
    }
    bits.push(row);
  }
  return {h:u, w:Math.max(maxx+1,1), bits:bits};
}
// 均等セル（1文字=cell列）の字送りを字間gapドットに詰める
// （2倍拡大すると字間も2ドットに広がり「上社」等で間延びして見える：北村さん指摘 2026-07-18。実車は字間1ドット相当）
function packCells(r, cell, gap){
  const cells=Math.ceil(r.w/cell);
  if(cells<=1) return r;
  const bits=Array.from({length:r.h},()=>[]);
  for(let i=0;i<cells;i++){
    const x0=i*cell, x1=Math.min(r.w,(i+1)*cell);
    let last=x0-1;
    for(let x=x0;x<x1;x++){ for(let y=0;y<r.h;y++){ if(r.bits[y][x]){ last=x; break; } } }
    if(last<x0) last=x0; // 空白文字はセル1列だけ残す
    for(let y=0;y<r.h;y++){
      for(let x=x0;x<=last;x++) bits[y].push(r.bits[y][x]);
      if(i<cells-1){ for(let g=0;g<gap;g++) bits[y].push(0); }
    }
  }
  return {h:r.h, w:bits[0].length, bits:bits};
}
// 2つのビットマップを横に並べる（間にgap列。高さは中央合わせ）
function hstack(a,b,gap){
  const h=Math.max(a.h,b.h), w=a.w+gap+b.w;
  const bits=Array.from({length:h},()=>new Array(w).fill(0));
  const blit=(src,x0)=>{ const y0=Math.floor((h-src.h)/2);
    for(let y=0;y<src.h;y++)for(let x=0;x<src.w;x++) if(src.bits[y][x]) bits[y0+y][x0+x]=1; };
  blit(a,0); blit(b,a.w+gap);
  return {h:h, w:w, bits:bits};
}

  if(pmUnit){

    if(pmUnit===10){
      const r=scale2(pmbits(text,0));
      // 全角のみの行（＝1文字20列の均等セル）は字間を1ドットに詰める。半角混じりはセル幅が揃わないので従来どおり
      if(/^[^\x00-\xff]+$/.test(text)) return packCells(r,20,1);
      return r;
    }
  }
  return tbits(text,h,ls||0);
}

  for(let y=0;y<tb2.h;y++)for(let x=0;x<tb2.w;x++)
    if(tb2.bits[y][x]&&x0+x>=0&&x0+x<m.w&&y0+y>=0&&y0+y<m.h) m.g[y0+y][x0+x]=1;

  for(let x=x0;x<=x1;x++){ if(y0>=0&&y0<m.h){m.g[y0][x]=1;} if(y1>=0&&y1<m.h){m.g[y1][x]=1;} }

}

  // 【仮登録・完成度80%】系統名に「.」を含む出入庫系統（猪.名〜南.港の19系統）は全部「系統表示なし」と推測（北村さん方針 2026-07-19。
  // 根拠＝森.新の実車確認からの一般化。経由もnoboxではデフォルト非表示＝森.新大森車庫と同じ。
  // ただしVIA系レジストリ（VIA_OVER/VIA_TOP/VIA_STACK）はこの判定より後に適用されるためnoboxでも効く＝
  // 「系統なし＋経由あり」が共存できる（v3.21 森.新新守山駅「大曽根」で実証）。実車で系統表示ありが見つかったらこの行を外して個別登録に切替）
  else if(route.indexOf('.')>=0) style='nobox';
  const isNum=/^[０-９0-9]+$/.test(num||'');
  let k=null,kan=null,n=null,bw;
  if(style==='h'){ k=jb(pre,10,0); n=isNum?numBits(num):jb(num,16,0); bw=k.w+n.w+7; }
  else if(style==='junkai'){ k=jb(pre,10,0); n=jb(num,10,0); bw=Math.max(k.w,n.w)+6; }
  else if(style==='kikan'){ k=jb(pre,9,3); n=isNum?numBits(num):jb(num,13,0); bw=Math.max(k.w,n.w)+6; }
  else if(style==='kan3'){ k=jb(pre,9,0); kan=jb('幹',10,0); n=isNum?numBits(num):jb(num,12,0); bw=Math.max(k.w+5, kan.w+n.w+9); } // 階段状3段用：幹は10ドット（7ドットではつぶれて読めない：北村さん実機確認）
  else if(style==='yuto'||style==='nobox'){ bw=0; } // 枠なし・行先のみ（ゆとりーと：北村さん実車確認 2026-07土曜6:39川宮「大曽根/Ozone」のみ。nobox＝ROUTE_NONE登録便）
  else { n=jb(num,12,0); bw=n.w+8; }
  // 行先部品（◯まわりは上段へ）※ゆとりーとは実車どおり経由を出さない
  let topLine='', viaName='';
  if(hs.v && style!=='yuto' && style!=='nobox'){
    let v=hs.v.replace('経由','').trim();
    const mw=v.match(/(左まわり|右まわり|大まわり|小まわり)/);
    if(mw){ topLine=mw[1]; v=v.replace(mw[1],'').trim(); }
    viaName=v;
  }
  // 2段表示の登録便：経由を上段へ移す（VIA_TOP＝実車確認済のみ。まわり表示と重なる系統は現状なし）
  let topPlain=false;
  const vt=VIA_TOP[route+'|'+(hsFull||'')];
  if(vt!==undefined && !topLine){ topLine=vt; viaName=''; topPlain=true; }
  // 経由サプレス（VIA_NONE）と経由2段縦積み（VIA_STACK）：どちらも実車写真確認済のみ（v3.16）
  if(VIA_NONE[route+'|'+(hsFull||'')]) viaName='';
  // 経由差し替え（VIA_OVER）：GTFSの経由と実車LEDの経由が違う便（v3.17 守山巡回で確認）
  const vo=VIA_OVER[route+'|'+(hsFull||'')];
  if(vo) viaName=vo;
  let vstack=null;
  const vs=VIA_STACK[route+'|'+(hsFull||'')];
  if(vs){
    viaName='';
    const bs=vs.slice(0,2).map(s=>jb(s,10,0));
    const vsw=Math.max.apply(null,bs.map(b=>b.w));
    const mm=bmNew(vsw,21);
    bs.forEach((b,i)=>bmBlit(mm,b,Math.floor((vsw-b.w)/2),i*11)); // 10ドット行×2（間1ドット）
    vstack={h:21,w:vsw,bits:mm.g};
  }
  // まわり便の実車レイアウト（v3.22 北村さん提供写真 2026-07-19＝名駅25左まわり・幹本郷1左まわり）：
  // ①↺＋「左まわり」は系統枠の下に小さく ②経由は上段小文字＋行先大の2段組（VIA_TOPと同じ見た目）
  // ③幹本郷1の実車は階段状でなく1行囲み枠「幹本郷1」＝まわり便はkan3も1行枠に変換
  // ※巡回系統（junkai）は枠内2段が既にあり対象外（実車写真が撮れたら別途）。↺はシステムフォント描画（PixelMplusに字がない）
  let mawari='', mrow=null, boxH=0;
  const mst=MAWARI_STYLE[route+'|'+(hsFull||'')]; // v3.26 まわり例外（実車確認済のみ）
  if(mst==='none' && topLine && /まわり/.test(topLine)) topLine=''; // 東海11左まわり＝まわり表示自体なし
  if(mst!=='top' && topLine && /^(左まわり|右まわり|大まわり|小まわり)$/.test(topLine) && (style==='h'||style==='kan3')){ // 'top'＝変換せず従来の上段文字（金山22）
    mawari=topLine; topLine='';
    if(viaName){ topLine=viaName; viaName=''; topPlain=true; } // 経由を上段へ（実車＝本陣・豊公橋/名東消防署が上段小文字）
    if(style==='kan3'){ pre='幹'+pre; kan=null; } // 階段状をやめて1行枠へ
    k=jb(pre,10,0); n=isNum?numBits(num):jb(num,13,0);
    boxH=Math.max(k.h,n.h)+4;
    mrow=hstack(mawariArrowBits(mawari), jb(mawari,10,0), 2); // 矢印＝手描き・文字＝10ドット（8ドットtbitsはつぶれる：v3.23）
    bw=Math.max(k.w+n.w+7, mrow.w+2);
    style='mawari';
  }
  // ゆとりーと例外：登録済みの便だけ経由スタック（7ドット行×4がH=30に収まる唯一のサイズ。
  // PixelMplusは10ドット固定で入らないため、この行だけ自動変換（tbits）を直接使う）
  let stack=null, stackW=0;
  if(style==='yuto'){
    const ys=YUTO_VIA[route+'|'+(hsFull||'')];
    if(ys){ stack=ys.slice(0,4).map(s=>tbits(s,7,0)); stackW=Math.max.apply(null,stack.map(b=>b.w)); }
  }
  // 3段構成の注記（RJ_NOTE）：行先を13ドットに詰めて「行先13／ローマ字7／注記10」の3段をH=30に収める。
  // v3.29のtbits8注記は「つぶれる＋ローマ字とくっつく」（北村さんiPhone確認 2026-07-19）→
  // v3.30で注記を10ドットjb（PixelMplusくっきり＝v3.23まわり文字と同じ教訓）・行先はtbits13（v3.24実績）に変更
  const note=(!topLine && style!=='yuto') ? (RJ_NOTE[route+'|'+(hsFull||'')]||'') : '';
  const nb=note? jb(note,10,0) : null;
  let tb2=null,db,vb=null,rb=null;
  // 2段経由の上段は10ドットのくっきり文字（7ドットでは幡・引・山がつぶれて読めない：北村さん実機確認 2026-07-18）。◯まわりは従来どおり
  if(topLine) tb2= topPlain? jb(topLine,10,0) : jb(topLine,9,5);
  // 2段の行先＝13ドットの自動変換（上段10より大きく）。v3.26でPM12を廃止：複雑な字（星ケ丘・名古屋駅の駅・屋）が
  // 12ドットでは字画がつぶれる（北村さんiPhone確認 2026-07-19。v3.14「潰れの犯人はPM12」の再発）。13ドット自動変換なら字画に余裕
  const mkDest=s=> (topPlain||note)? tbits(s,13,0) : jb(s, topLine?14:18, 0);
  // 2文字の行先（経由がインラインに付かない時だけ）は「上　社」のように1文字ぶん空ける（北村さん提案 2026-07-18・実車の電光表示の流儀）
  const dc=[...hs.d];
  if(!viaName && dc.length===2 && !/[\x00-\xff]/.test(hs.d)){
    const d1=mkDest(dc[0]), d2=mkDest(dc[1]);
    db=hstack(d1, d2, d1.w);
  } else db=mkDest(hs.d);
  if(viaName) vb=jb(viaName+'・', topLine?9:11, 0);
  if(rj) rb=rtext(rj);  // ローマ字は内蔵5x7ドットフォント（端末非依存）
  const destY = tb2? (topPlain? tb2.h : tb2.h+1) : (note?0:1); // topPlain＝上段10＋行先13＋ローマ字7でH=30ちょうど（v3.26）
  const romY = note? destY+db.h : Math.min(H-7, destY+db.h+2); // note＝3段（行先13＋ローマ字7＋注記10＝H=30ちょうど。フォント側の余白が実質の行間。v3.30）
  const content=(vb?vb.w:0)+(vstack?vstack.w+2:0)+db.w;
  const need=Math.max(content, tb2?tb2.w:0, rb?rb.w:0, nb?nb.w:0);
  const leftW = stack? stackW+4 : bw+3; // 左側＝系統箱 or 経由スタック（従来styleは従来どおり）
  // 実車のLEDパネルは固定幅：短い行先（「印場」「大曽根」等）は左右に余白を残して中央に光る。
  // 最小幅を設けないとcanvasが縦長比率になり、画面で間延びする（北村さん実機確認 2026-07-18）
  const W=Math.max(leftW+2+need+3, 130);
  const m=bmNew(W,H);
  // 箱（ゆとりーとラインは枠なし）
  if(style!=='yuto'&&style!=='nobox'&&style!=='mawari') bmRect(m,0,0,bw,H-1);
  // 経由スタック（各行センタリング・上から7ドットずつ）
  if(stack) stack.forEach((b,i)=>bmBlit(m,b,2+Math.floor((stackW-b.w)/2),1+i*7));
  if(style==='h'){ bmBlit(m,k,3,Math.floor((H-k.h)/2)+3); bmBlit(m,n,3+k.w+2,Math.floor((H-n.h)/2)); }
  else if(style==='junkai'){ bmBlit(m,k,Math.floor((bw-k.w)/2)+1,2); bmBlit(m,n,Math.floor((bw-n.w)/2)+1,H-3-n.h); }
  else if(style==='kikan'){ bmBlit(m,k,Math.floor((bw-k.w)/2)+1,3); bmBlit(m,n,Math.floor((bw-n.w)/2)+1,H-3-n.h); }
  else if(style==='kan3'){
    // 実車どおり階段状3段：右上=○○（名駅など）・左中=[幹]小枠・右下=数字
    // （北村さん実車写真 2026-07-18：幹名駅２東海橋・野跡駅・名古屋駅、幹星丘１梅森荘）
    bmBlit(m,k,bw-2-k.w,1);           // 右上
    bmRect(m,2,12,3+kan.w,23);        // 左中の[幹]枠（10ドットの幹が入る高さ）
    bmBlit(m,kan,3,13);
    bmBlit(m,n,bw-2-n.w,H-3-n.h);     // 右下（大きめ）
  }
  else if(style==='mawari'){
    // 上＝1行枠（系統名小＋数字大）・下＝↺まわり（枠なし）
    bmRect(m,0,0,bw,boxH);
    const inW=k.w+2+n.w, ix=Math.max(2,Math.floor((bw-inW)/2)+1);
    bmBlit(m,k,ix,Math.floor((boxH+1-k.h)/2));
    bmBlit(m,n,ix+k.w+2,Math.floor((boxH+1-n.h)/2));
    bmBlit(m,mrow,Math.max(1,Math.floor((bw-mrow.w)/2)),boxH+2);
  }
  else if(style==='yuto'||style==='nobox'){ /* 枠なし */ }
  else { bmBlit(m,n,4,Math.floor((H-n.h)/2)); }
  // 行先エリア
  const areaX=leftW, areaW=W-areaX;
  if(tb2) bmBlit(m,tb2,areaX+Math.max(0,Math.floor((areaW-tb2.w)/2)),0);
  let x0=areaX+Math.max(0,Math.floor((areaW-content)/2));
  if(vstack){ bmBlit(m,vstack,x0,Math.floor((H-vstack.h)/2)); x0+=vstack.w+2; } // 2段縦積み経由（上下中央）
  if(vb){ bmBlit(m,vb,x0,destY+db.h-vb.h-1); x0+=vb.w; }
  bmBlit(m,db,x0,destY);
  if(rb) bmBlit(m,rb,Math.max(areaX,x0+db.w-rb.w),romY);
  if(nb) bmBlit(m,nb,Math.max(areaX,x0+db.w-nb.w),Math.min(H-10,romY+7)); // 3段目の日本語注記＝10ドットくっきり・ローマ字と右端揃え（v3.30）
  // ドット描画
  const cv=bmDraw(m);
  window._ledDbg={style:style, top:topLine, via:viaName, stk:(vs?vs.join('/'):''), mw:mawari, W:W, H:H, dbw:db.w, dbh:db.h, topPlain:topPlain, note:note}; // 検証用（スモークテストが参照）
  return cv;
}
// ビットマップ→LED風canvas（正面LED共通のドット描画）
function bmDraw(m){
  const W=m.w, H=m.h, dot=6;
  const cv=document.createElement('canvas');
  cv.width=W*dot; cv.height=H*dot;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#141414'; ctx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    ctx.beginPath();
    ctx.arc(x*dot+dot/2, y*dot+dot/2, m.g[y][x]?dot/2-0.6:dot/2-1.8, 0, 6.284);
    ctx.fillStyle=m.g[y][x]?'#f2f2ea':'#232323'; // 白色LED（新型車仕様。旧型はオレンジ。メーグルもオレンジに見えるが白のまま＝北村さん判断の現状維持）
    ctx.fill();
  }
  cv.style.flex='1'; cv.style.minWidth='0'; cv.style.width='100%'; cv.style.height='auto'; cv.style.display='block'; cv.style.borderRadius='4px';
  return cv;
}
// メーグル専用の正面LED：左端「観光/ルート」2段＋縦棒（枠なし）が全車共通（写真6枚すべてで確認）。
// 右側は登録済みの区間表示（mg）があればそれ、なければGTFS表記のフォールバック（経由小＋行先大）。
function meguruCanvas(hs, rj, mg){
  const H=30;
  // 左ブロック：観光/ルート 2段＋縦棒区切り（枠なし）
  const g1=jb('観光',10,0), g2=jb('ルート',10,0);
  const gw=Math.max(g1.w,g2.w);
  const leftW=2+gw+3+1+2; // 余白+文字+すき間+縦棒+すき間
  // 右側の部品を組み立てる： [bitmap, romaji用bitmap or null] を横に並べる
  const parts=[]; // {b:bitmap, y:数値 or 'c'(中央), rj:bitmap or null}
  let dbw=0, kinds='';
  if(mg){
    mg.p.forEach(pp=>{
      if(Array.isArray(pp)){
        if(pp.length===1){ parts.push({b:jb(pp[0],10,0), y:'c'}); kinds+='s'; } // 1行の小さめ＝中央
        else { // 3段などの縦積み小（tbits9：PixelMplusは10ドット固定で3段が入らないため）
          const bs=pp.map(s=>tbits(s,9,0));
          const w2=Math.max.apply(null,bs.map(b=>b.w));
          const mm=bmNew(w2, 1+pp.length*10-1);
          bs.forEach((b,i)=>bmBlit(mm,{h:b.h,w:b.w,bits:b.bits},Math.floor((w2-b.w)/2),1+i*10));
          parts.push({b:{h:mm.h,w:mm.w,bits:mm.g}, y:'c'}); kinds+='t';
        }
      } else { // 大きい行先（実車：行先大＋ローマ字）
        const db=jb(pp,18,0);
        dbw=db.w;
        parts.push({b:db, y:1, rj:(mg.rj?rtext(mg.rj):null)}); kinds+='L';
      }
    });
    if(mg.k){ // 右端「経由」縦積み小
      const k1=jb('経',10,0), k2=jb('由',10,0);
      const mm=bmNew(Math.max(k1.w,k2.w), 22);
      bmBlit(mm,k1,0,0); bmBlit(mm,k2,0,12);
      parts.push({b:{h:22,w:mm.w,bits:mm.g}, y:'c'}); kinds+='k';
    }
  } else {
    // フォールバック：GTFS表記どおり（経由小＋行先大＋ローマ字。他系統と同じ描き方）
    if(hs.v) parts.push({b:jb(hs.v.replace('経由','').trim()+'・',11,0), y:'v'});
    const db=jb(hs.d,18,0);
    dbw=db.w;
    parts.push({b:db, y:1, rj:(rj?rtext(rj):null)});
    kinds='fallback';
  }
  const gap=3;
  const content=parts.reduce((a,p)=>a+p.b.w,0)+gap*(parts.length-1);
  const W=Math.max(leftW+2+content+3, 130); // 実車のパネルは固定幅＝短い表示は中央に（v3.5と同じ）
  const m=bmNew(W,H);
  bmBlit(m,g1,2+Math.floor((gw-g1.w)/2),3);
  bmBlit(m,g2,2+Math.floor((gw-g2.w)/2),17);
  for(let y=2;y<H-2;y++) m.g[y][2+gw+3]=1; // 縦棒
  const areaX=leftW+2, areaW=W-areaX;
  let x0=areaX+Math.max(0,Math.floor((areaW-content)/2));
  parts.forEach(p=>{
    let y0;
    if(p.y==='c') y0=Math.floor((H-p.b.h)/2);
    else if(p.y==='v') y0=1+20-p.b.h-1; // フォールバックの経由小：行先(20ドット)の下端に揃える
    else y0=p.y;
    bmBlit(m,p.b,x0,y0);
    if(p.rj){ const ry=Math.min(H-7, y0+p.b.h+2); bmBlit(m,p.rj,x0+Math.max(0,Math.floor((p.b.w-p.rj.w)/2)),ry); }
    x0+=p.b.w+gap;
  });
  const cv=bmDraw(m);
  window._ledDbg={style:'meguru', top:'', via:(mg?'':(hs.v||'')), W:W, H:H, dbw:dbw, mg:(mg?kinds:'fallback')};
  return cv;
}
// Ｃ－７５８（都心ループ）専用の正面LED：左端「C-758」囲み枠（上下いっぱいではなく少し内側）＋
// 右エリア上段小「都心ループ」＋下段「次に通る主要地点（大きく）・その先（・付きで小さく）」。
// 実車写真14枚（北村さん提供 2026-07-19）が典拠。♿・ベビーカーマークは出さない方針（v3.12）どおり。
// ローマ字行は正面写真に無いため出さない（実車は日英交互表示の可能性があるが、LEDは常に日本語フレームを再現する方針）。
function c758Canvas(hs, rj, mg){
  const H=30;
  const cb=jb('C-758',10,0);   // 枠内の文字（LEDに出すのは半角のC-758。レジストリのキーは全角Ｃ－７５８なので混同注意）
  const boxW=cb.w+8;
  const leftW=boxW+3;
  const top=jb('都心ループ',10,0);
  let db, vb=null;
  if(mg){
    db=jb(mg.a,18,0);  // 次の主要地点＝大きく（PixelMplus10の2倍拡大＝20ドット）
    vb=jb('・'+mg.b,11,0); // その先＝小さく（PixelMplus10の10ドット素のまま。
    // ※v3.13ではPM12（12ドット版）を使っていたが、北村さんiPhoneで潰れて読めなかった（2026-07-19スクショ）。
    //   同じ画面でフォールバック側の10ドットは「めっちゃよみやすい」＝PM10に統一（v3.14）
  }else{
    // フォールバック：未登録キーでも壊れない（公式/GTFS表記どおり経由小＋行先大。ローマ字は省略＝高さが足りない）
    if(hs.v) vb=jb(hs.v.replace('経由','').trim()+'・',11,0);
    db=jb(hs.d,18,0);
  }
  const content=db.w+(vb?vb.w:0);
  const need=Math.max(content, top.w);
  const W=Math.max(leftW+2+need+3, 130); // 実車のパネルは固定幅＝短い表示は中央に（v3.5と同じ）
  const m=bmNew(W,H);
  const by0=7;                          // 枠＝10ドット文字＋上下3ドット（y7〜22）
  bmRect(m,1,by0,boxW,by0+15);
  bmBlit(m,cb,1+4,by0+3);
  const areaX=leftW+2, areaW=W-areaX;
  bmBlit(m,top,areaX+Math.max(0,Math.floor((areaW-top.w)/2)),0);
  const destY=10;
  let x0=areaX+Math.max(0,Math.floor((areaW-content)/2));
  if(!mg && vb){ bmBlit(m,vb,x0,destY+db.h-vb.h-1); x0+=vb.w; } // フォールバックは経由が先（小さく）
  bmBlit(m,db,x0,destY);
  if(mg && vb) bmBlit(m,vb,x0+db.w,destY+db.h-vb.h-1);          // 区間表示は2つ目が後ろ（小さく・下端揃え）
  const cv=bmDraw(m);

  return cv;
}
async function mountLed(route, hs, rj, hsFull, mg){

function sideCanvas(route, hs, rj, colsIn, noRoute){
  const colw=12;
  // 柱：SIDE_STOPSに登録された実車どおりの並び（右→左＝進行方向順）
  const cols=colsIn.slice(0,4);
  const maxlen=Math.min(6, Math.max.apply(null, cols.map(c=>Math.min(6,[...c].length))));
  // 上段：系統＋英字の目的地（2025年12月〜の実車仕様）。英語名が無い行先のみ日本語
  let topParts, topW;
  // noRoute（ROUTE_NONE登録便）＝上段に系統名を出さない（森.新は「Omorishako」のみ：北村さん実車確認 2026-07-19＝現行体裁）。
  // ※上.西の令和5年写真では上段が日本語「西部医療センター」だったが旧体裁（2025年12月の体裁変更前）のためローマ字を維持
  if(rj){
    const rr=rtext(rj);
    if(noRoute){ topParts=[[rr,0,3]]; topW=rr.w; }
    else { const rb=jb(route,10,0); topParts=[[rb,0,1],[rr,rb.w+4,3]]; topW=rb.w+4+rr.w; }
  } else {
    const tbx=jb((noRoute?'':route+'　')+hs.d,10,0);
    topParts=[[tbx,0,1]];
    topW=tbx.w;
  }
  const ncol=cols.length;
  const colsW=4+ncol*colw+(ncol-1)*16+4;
  const W=Math.max(colsW, topW+8);
  const colH=maxlen*11;
  const H=14+colH+2;
  const m=bmNew(W,H);
  const tx=Math.max(0,Math.floor((W-topW)/2));
  topParts.forEach(p=>bmBlit(m,p[0],tx+p[1],p[2]));
  // 柱（右=起点 → 左=終点）横幅いっぱいに均等配置
  const y0=14;
  const step=(ncol>1)? Math.floor((W-8-colw)/(ncol-1)) : 0;
  const xs=[];
  for(let i=0;i<ncol;i++){ xs.push(W-4-colw-step*i); }
  cols.forEach((name,i)=>{
    const x=xs[i];
    const chars=[...name].slice(0,6);
    const pad=Math.floor((maxlen-chars.length)*11/2);
    chars.forEach((ch,j)=>{
      const b=jb(ch,10,0);
      bmBlit(m,b,x+Math.max(0,Math.floor((colw-b.w)/2)),y0+pad+j*11);
    });
  });
  // 黄色の左向き矢印（柱と柱の中間に配置、縦中央）
  const ay=y0+Math.floor(colH/2);
  for(let i=0;i<ncol-1;i++){
    const xc=Math.floor((xs[i+1]+colw+xs[i])/2)-6;
    for(let x=4;x<11;x++){ for(let dy=-1;dy<=1;dy++){ const yy=ay+dy; if(yy>=0&&yy<H&&xc+x<W) m.g[yy][xc+x]=2; } }
    for(let k=0;k<4;k++){ for(let dy=-k;dy<=k;dy++){ const yy=ay+dy,xx=xc+k; if(yy>=0&&yy<H&&xx>=0&&xx<W) m.g[yy][xx]=2; } }
  }
  // 2色ドット描画
  const dot=6;
  const cv=document.createElement('canvas');
  cv.width=W*dot; cv.height=H*dot;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#141414'; ctx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const vv=m.g[y][x];
    ctx.beginPath();
    ctx.arc(x*dot+dot/2, y*dot+dot/2, vv?dot/2-0.6:dot/2-1.8, 0, 6.284);
    ctx.fillStyle= vv===2?'#ffd400' : (vv===1?'#f2f2ea':'#232323'); // 白色LED＋黄色矢印
    ctx.fill();
  }
  cv.style.width='100%'; cv.style.maxWidth='400px'; cv.style.height='auto'; cv.style.display='block'; cv.style.margin='0 auto';
  return cv;
}

const lmCache=JSON.parse(localStorage.getItem('lmCache3')||'{}');
const OVERPASS=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
async function annotate(poleIdxs){
  const need=poleIdxs.filter(i=>!(String(i) in lmCache));
  need.forEach(i=>{const el=document.getElementById('lm'+i); if(el) el.textContent='　'+t('lmsearch');});
  if(need.length){
    let q='[out:json][timeout:10];(';
    need.forEach(i=>{const s=GD.stops[i];
      q+='nwr(around:80,'+s[1]+','+s[2]+')["name"]["shop"];';
      q+='nwr(around:80,'+s[1]+','+s[2]+')["name"]["amenity"]["amenity"!~"parking|vending_machine|bicycle_parking|toilets|waste_basket"];';
    });
    q+=');out center tags;';
    let j=null;
    for(const ep of OVERPASS){
      try{
        const r=await fetch(ep,{method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:'data='+encodeURIComponent(q)});
        if(!r.ok){ console.warn('overpass status',r.status,ep); continue; }
        j=await r.json(); break;
      }catch(e){ console.warn('overpass error',ep,e); }
    }
    if(!j){
      need.forEach(i=>{const el=document.getElementById('lm'+i); if(el) el.textContent='';});
      return;
    }
    need.forEach(i=>{
      const s=GD.stops[i];
      let best=null,bd=1e9;
      (j.elements||[]).forEach(e=>{
        const la=(e.lat!=null)?e.lat:(e.center&&e.center.lat);
        const lo=(e.lon!=null)?e.lon:(e.center&&e.center.lon);
        if(la==null||lo==null)return;
        const dd=dist(s[1],s[2],la,lo);
        if(dd<bd&&dd<=80){bd=dd;best=e;}
      });
      lmCache[String(i)]=best?{n:best.tags.name,ne:best.tags['name:en']||'',d:Math.round(bd)}:null;
    });
    localStorage.setItem('lmCache3',JSON.stringify(lmCache));
  }
  poleIdxs.forEach(i=>{
    const lm=lmCache[String(i)];
    const el=document.getElementById('lm'+i);
    if(!lm){ if(el&&el.textContent.indexOf(t('lmsearch'))>=0) el.textContent=''; return; }
    let nm=lm.n;
    if(lang!=='ja' && lm.ne) nm=lm.n+' ('+lm.ne+')';
    const txt=t(lm.d<=50?'lmnear':'lmnear2', nm);
    if(el) el.textContent='　'+txt;
    const mk=lmapMarkers[i];
    if(mk&&mk.getPopup()) mk.setPopupContent(mk.getPopup().getContent()+'<br>'+esc(txt));
  });
}

// ================== 降車ナビ（乗車後の「あと○駅」＋音声アナウンス） ==================
// 「このバスに乗った！」→ GPSでバスの進行を追い、残り停留所数を大きく表示。
// イヤホン利用者向けにバス停通過ごとに「{行先}まで、あと、{n}駅です」を読み上げる。
// GPSが使えない時は時刻表で推定（遅延がわからないため到着の断定はしない安全設計）。
const VOICE_LANG={ja:'ja-JP',en:'en-US',zh:'zh-CN',ko:'ko-KR',vi:'vi-VN',id:'id-ID',tl:'fil-PH'};
const RIDE_AT=60; // このバス停に「着いた」とみなす半径(m)
let ride=null;
function vname(n){ return lang==='ja'? n : (enOf(n)||n); } // 音声用：日本語以外は英語名で読む
function speak(txt){
  if(!ride||ride.muted||!window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang=VOICE_LANG[lang]||'ja-JP';
    u.rate=0.95;
    speechSynthesis.speak(u);
  }catch(e){}
}
function rideStopName(k){ return GD.stops[ride.pat[k]][0]; }
function rideDistTo(k,la,lo){ const s=GD.stops[ride.pat[k]]; return dist(la,lo,s[1],s[2]); }
// 到着予測（v3.12）：時刻表＋GPSで観測した遅れ。「ごろ」表示で断定しない
function rideNowMin(){ const n=nowDate(); let m=n.getHours()*60+n.getMinutes()+n.getSeconds()/60; if(ride&&m<ride.times[ride.i0]-720) m+=1440; return m; } // 深夜便の日またぎ対策
function rideEstArr(){ return ride.times[ride.iD]+(ride.delay||0); }
function rideRemMin(){ return Math.max(0, Math.ceil(rideEstArr()-rideNowMin())); }
function startRide(){
  const rc=window._rideCand;
  if(!rc||!dest||ride) return;
  const tr=GD.trips[rc.ti];
  const pat=GD.patterns[tr[1]], times=tr[4];
  const i0=pat.indexOf(rc.pole);
  const destSet=new Set(nameToPoles[dest]);
  let iD=-1;
  for(let k=i0+1;k<pat.length;k++){ if(destSet.has(pat[k])){ iD=k; break; } }
  if(i0<0||iD<0) return;
  // appr＝「次に着くバス停」のindex。乗車直後は次のバス停。
  ride={pat:pat, times:times, i0:i0, iD:iD, appr:i0+1, muted:false, mode:'gps', arrived:false, wl:null, watchId:null, timer:null, delay:0};
  ride.delay=Math.max(0, Math.round(rideNowMin()-times[i0])); // 乗車時点の遅れ（時刻表比。早発は0扱い）
  document.getElementById('rideview').style.display='block';
  document.body.style.overflow='hidden';
  rideRender(t('rgpswait'));
  speak(t('rvstart', vname(dest), iD-i0)); // 最初のspeakはボタン操作内で（iOSの制約）
  rideAwake();
  if(typeof DEBUG_DRIVE!=='undefined' && DEBUG_DRIVE){ // デバッグ：走行再現（?drive=秒/駅。?wrong=1で3駅目から逸走）
    let k=i0, wn=0;
    const wbase=GD.stops[pat[Math.min(i0+2,iD)]];
    const dt=setInterval(()=>{
      if(!ride||ride.arrived){ clearInterval(dt); return; }
      if(DEBUG_WRONG && k>=i0+2){ wn++; ridePos(wbase[1]+0.004*wn, wbase[2], 5); } // 1駅ぶんずつ北へ逸走
      else { k=Math.min(k+1,iD); const s=GD.stops[pat[k]]; ridePos(s[1],s[2],5); }
    }, DEBUG_DRIVE*1000);
    ride.driveTimer=dt;
  } else if(navigator.geolocation){
    ride.watchId=navigator.geolocation.watchPosition(
      p=>ridePos(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
      e=>rideFallback(),
      {enableHighAccuracy:true, maximumAge:2000, timeout:15000});
  } else rideFallback();
}
async function rideAwake(){ // 画面が消えると音声もGPSも止まるので点灯を維持（対応端末のみ）
  try{ if(ride&&navigator.wakeLock){ ride.wl=await navigator.wakeLock.request('screen'); } }catch(e){}
}
document.addEventListener('visibilitychange',()=>{ if(ride&&document.visibilityState==='visible') rideAwake(); });
function ridePos(la,lo,acc){
  if(!ride||ride.arrived) return;
  if(acc!=null && acc>150) return; // 精度の悪い測位は無視（誤警報防止）
  if(ride.timer){ clearInterval(ride.timer); ride.timer=null; } // GPS復帰→時刻表推定は停止
  ride.mode='gps';
  // 乗り間違い検知：正しいルートの全バス停から450m超が「3回連続」＝完全にルートを外れた時だけ警告
  // （GPS誤差や道路の蛇行では鳴らさない。不安製造機にしない：北村さん方針 2026-07-17）
  let dmin=1e9;
  for(let k=ride.i0;k<ride.pat.length;k++){ const dd=rideDistTo(k,la,lo); if(dd<dmin) dmin=dd; }
  if(dmin>450){
    ride.offCnt=(ride.offCnt||0)+1;
    if(!ride.off && ride.offCnt>=3){ ride.off=true; speak(t('rvwrong')); }
  } else {
    ride.offCnt=0;
    if(ride.off && dmin<300){ ride.off=false; speak(t('rvback')); } // 復帰（迂回運行やGPS迷子から戻った）
  }
  // 到達判定（警告中は進めない＝ルート外の座標で駅数が狂うのを防ぐ）
  if(!ride.off){
    // 前から順に「通過済みのいちばん先のバス停」を探す（半径内 or 次のバス停の方が近い＝中間点通過）
    let reached=ride.appr-1;
    for(let k=ride.appr;k<=ride.iD;k++){
      const dk=rideDistTo(k,la,lo);
      if(dk<RIDE_AT){ reached=k; continue; }
      if(k<ride.iD && dmin<=450 && rideDistTo(k+1,la,lo)<dk){ reached=k; continue; } // 中間点判定はルート上にいる時だけ（外れかけの座標で駅数を進めない）
      break;
    }
    if(reached>=ride.appr){
      if(reached>=ride.iD){ rideArrive(); return; }
      ride.delay=Math.round(rideNowMin()-ride.times[reached]); // 通過実績で遅れを更新（到着予測に反映）
      ride.appr=reached+1;
      rideAnnounce();
    }
  }
  rideRender();
}
function rideRedo(){ endRide(); useGPS(); window.scrollTo(0,0); } // 降りてやり直す
function rideFallback(){ // GPS不可：時刻表で推定（到着の断定はしない）
  if(!ride||ride.arrived||ride.mode==='sched') return;
  ride.mode='sched';
  if(ride.timer) clearInterval(ride.timer);
  ride.timer=setInterval(rideTick,10000);
  rideTick();
}
function rideTick(){
  if(!ride||ride.arrived) return;
  const now=nowDate();
  let nm=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  if(nm<ride.times[ride.i0]-720) nm+=1440; // 深夜便の日またぎ対策
  let na=ride.appr;
  while(na<ride.iD && ride.times[na]<=nm) na++;
  if(na>ride.appr){ ride.appr=na; rideAnnounce(); rideRender(); }
  else rideRender();
}
function rideAnnounce(){
  const n=ride.iD-ride.appr+1; // 降車バス停まで残り（いま向かっているバス停を含む）
  if(n<=1) speak(t('rvsoon', vname(dest)));
  else speak(t('rvnext', vname(rideStopName(ride.appr)), vname(dest), n));
}
function rideArrive(){
  ride.arrived=true; ride.off=false;
  speak(t('rvarr', vname(dest)));
  if(ride.watchId!=null){ try{navigator.geolocation.clearWatch(ride.watchId);}catch(e){} ride.watchId=null; }
  if(ride.timer){ clearInterval(ride.timer); ride.timer=null; }
  if(ride.driveTimer){ clearInterval(ride.driveTimer); ride.driveTimer=null; }
  rideRender();
}
function rideMute(){
  if(!ride) return;
  ride.muted=!ride.muted;
  if(ride.muted){ try{speechSynthesis.cancel();}catch(e){} }
  rideRender();
}
function endRide(){
  if(!ride) return;
  if(ride.watchId!=null){ try{navigator.geolocation.clearWatch(ride.watchId);}catch(e){} }
  if(ride.timer) clearInterval(ride.timer);
  if(ride.driveTimer) clearInterval(ride.driveTimer);
  if(ride.wl){ try{ride.wl.release();}catch(e){} }
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
  ride=null;
  document.getElementById('rideview').style.display='none';
  document.body.style.overflow='';
}
function rideRender(msg){
  if(!ride) return;
  const rv=document.getElementById('rideview');
  const n=ride.iD-ride.appr+1;
  let html='<div class="ridewrap">';
  if(ride.off && !ride.arrived){ // 乗り間違い警告（完全にルートを外れた時だけ）
    html+='<div class="ridearr" style="background:var(--red-bg); color:var(--red)">'+t('rwrong')+'</div>';
    html+='<button class="btn btn-blue" onclick="rideRedo()">'+t('rredo')+'</button>';
  }
  if(ride.arrived){
    html+='<div class="ridearr">🚏 '+t('rarr', esc(sn(dest)))+'</div>';
  } else if(n<=1){
    html+='<div class="ridearr soon">'+t('rsoon', esc(sn(dest)))+'</div>';
  } else {
    html+='<div class="ridebignum">'+t('rbig','<span class="ridenum">'+n+'</span>')+'</div>';
    html+='<div class="ridenext"><div class="label">'+t('rnextl')+'</div><div class="ridenextname">'+esc(sn(rideStopName(ride.appr)))+'</div></div>';
  }
  html+='<div class="ridedest"><div class="label">'+t('rdestl')+'</div><div style="font-size:24px; font-weight:700">🏁 '+esc(sn(dest))+'</div>';
  if(!ride.arrived){ // 到着予測：定刻を主表示＋観測した遅れを添える（電車乗り継ぎの人が予定と見比べられる：北村さん 2026-07-18）
    const rm=rideRemMin(); ride._remShown=rm;
    const late=Math.round(ride.delay||0);
    html+='<div style="margin-top:4px; font-size:20px">🕐 '+t('rarrtime', fmt(ride.times[ride.iD]), (late>=1? t('rlate',late):''), '<b>'+rm+'</b>')+'</div>';
  }
  html+='</div>';
  if(!ride.arrived){
    // これから停まるバス停（車内表示ふうに）
    html+='<div class="buslist ok" style="font-size:17px">';
    const showN=Math.min(ride.appr+4, ride.iD);
    for(let k=ride.appr;k<=showN;k++){
      if(k===ride.iD) html+='<div style="font-weight:700">🏁 '+esc(sn(rideStopName(k)))+'</div>';
      else html+='<div>・'+esc(sn(rideStopName(k)))+'</div>';
    }
    if(showN<ride.iD){
      if(showN<ride.iD-1) html+='<div>…</div>';
      html+='<div style="font-weight:700">🏁 '+esc(sn(rideStopName(ride.iD)))+'</div>';
    }
    html+='</div>';
    if(msg) html+='<div class="small" style="text-align:center; margin-top:8px">'+esc(msg)+'</div>';
    if(ride.mode==='sched') html+='<div class="warn" style="font-size:15px; margin-top:10px">'+t('rsched')+'</div>';
    html+='<div class="small" style="text-align:center; margin-top:10px">'+t('rkeep')+'</div>';
    html+='<button class="btn btn-gray" onclick="rideMute()" style="margin-top:12px">'+(ride.muted?t('runmute'):t('rmute'))+'</button>';
  }
  html+='<button class="btn '+(ride.arrived?'btn-blue':'btn-gray')+'" onclick="endRide()" style="margin-top:8px">'+t('rend')+'</button>';
  html+='</div>';
  rv.innerHTML=html;
}

// ================== デバッグモード（開発確認用・URLに何も付けなければ一切動かない） ==================
// ?at=HHMM または ?at=YYYYMMDD-HHMM …その日時のダイヤで判定（夜間でも昼のバスを確認できる）
// ?led=系統名 …その系統の全行先LEDを一覧プレビュー ／ ?led=系統名|行先表示 …1枚だけ
// ?gps=バス停名 または ?gps=バス停名|のりば番号 …そのバス停に立っている設定（📍ボタンが偽GPSになる）
// ?drive=秒数 …降車ナビ開始後、指定秒ごとに1駅ずつバスが進む走行再現（実GPSは使わない）
// 例: ?at=0900&gps=守山プール&drive=5  ?led=ゆとりーとライン
let DEBUG_AT=null, DEBUG_POS=null, DEBUG_DRIVE=0, DEBUG_WRONG=false;
try{
  const q=new URLSearchParams(location.search);
  const v=q.get('at');
  if(v){
    const ma=v.match(/^(?:(\d{4})(\d{2})(\d{2})-)?(\d{1,2})(\d{2})$/);
    if(ma){
      const b=new Date();
      DEBUG_AT=new Date(ma[1]?+ma[1]:b.getFullYear(), ma[2]?+ma[2]-1:b.getMonth(), ma[3]?+ma[3]:b.getDate(), +ma[4], +ma[5], 0);
    }
  }
  const g=q.get('gps');
  if(g){
    const gp=g.split('|');
    const ps=nameToPoles[gp[0]];
    if(ps){
      let pi=ps[0];
      if(gp[1]!==undefined){ const f=ps.find(i=>GD.stops[i][3]===gp[1]); if(f!==undefined) pi=f; }
      const s=GD.stops[pi];
      DEBUG_POS={lat:s[1], lon:s[2], name:gp[0]+(s[3]?' のりば'+s[3]:''), q:gp[0], pc:gp[1]||''};
    }
  }
  const dv=q.get('drive');
  if(dv!=null) DEBUG_DRIVE=Math.max(1, parseInt(dv)||5);
  if(q.get('wrong')!=null) DEBUG_WRONG=true; // 走行再現で3駅目からわざと逸走（乗り間違い警告の確認用）
}catch(e){}
function nowDate(){ return DEBUG_AT? new Date(DEBUG_AT) : new Date(); }
try{
  const parts=[]; // 消し忘れ防止の赤帯
  if(DEBUG_AT) parts.push(DEBUG_AT.getFullYear()+'/'+(DEBUG_AT.getMonth()+1)+'/'+DEBUG_AT.getDate()+' '+fmt(DEBUG_AT.getHours()*60+DEBUG_AT.getMinutes())+' のダイヤ');
  if(DEBUG_POS) parts.push('現在地='+DEBUG_POS.name);
  if(DEBUG_DRIVE) parts.push('走行再現 '+DEBUG_DRIVE+'秒/駅'+(DEBUG_WRONG?'（逸走テスト）':''));
  if(parts.length){
    const bn=document.createElement('div');
    bn.style.cssText='background:#c0392b;color:#fff;text-align:center;font-size:14px;font-weight:700;padding:6px;border-radius:10px;margin-bottom:10px;cursor:pointer;';
    bn.textContent='🔧 デバッグ中：'+parts.join('・')+'（タップで設定変更）';
    bn.onclick=function(){ openDbg(); };
    const cd=document.getElementById('cardDest');
    cd.parentNode.insertBefore(bn, cd);
  }
}catch(e){}
// ---- デバッグパネル（タイトルの🚌を3回タップ、またはデバッグ中の赤帯タップで開く） ----
// フォームでURLパラメータを組み立てて再読み込みするだけの薄い作り（判定ロジックは上のパラメータ処理と共通）
function openDbg(){
  let p=document.getElementById('dbgPanel');
  if(p){ p.style.display='block'; return; }
  const pad=n=>('0'+n).slice(-2);
  const at=DEBUG_AT;
  let ledNow=''; try{ ledNow=new URLSearchParams(location.search).get('led')||''; }catch(e){}
  const ledSp=ledNow.split('|'), ledR=ledSp[0]||'', ledH=ledSp[1]||'';
  const inp='font-size:18px; padding:8px; border:2px solid #ccc; border-radius:8px;';
  p=document.createElement('div');
  p.id='dbgPanel';
  p.style.cssText='position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1200; overflow:auto;';
  p.innerHTML='<div class="card" style="max-width:480px; margin:30px auto; padding:18px">'
    +'<b>🔧 デバッグ設定（検証用の裏メニュー）</b>'
    +'<div class="small">設定はURLに付くだけです。「すべて解除」でいつでも通常に戻ります。</div>'
    +'<div class="label" style="margin-top:14px">📅 ダイヤの日時を固定（夜でも昼のバスを表示）</div>'
    +'<input type="date" id="dbgDate" style="'+inp+'" value="'+(at? at.getFullYear()+'-'+pad(at.getMonth()+1)+'-'+pad(at.getDate()) :'')+'"> '
    +'<input type="time" id="dbgTime" style="'+inp+'" value="'+(at? pad(at.getHours())+':'+pad(at.getMinutes()) :'')+'">'
    +'<div class="small">時刻だけ入れれば今日のその時刻。空なら固定しない。</div>'
    +'<div class="label" style="margin-top:14px">🚏 いる場所をバス停にする（📍ボタンが偽GPSになる）</div>'
    +'<input type="text" id="dbgStop" style="'+inp+' width:60%" placeholder="バス停名（例：守山プール）" value="'+esc(DEBUG_POS?DEBUG_POS.q:'')+'"> '
    +'<input type="text" id="dbgPole" style="'+inp+' width:30%" placeholder="のりば(任意)" value="'+esc(DEBUG_POS?DEBUG_POS.pc:'')+'">'
    +'<div id="dbgStopMsg" class="small"></div>'
    +'<div class="label" style="margin-top:14px">🚌 走行再現（「乗った！」の後、バスが自動で進む）</div>'
    +'<select id="dbgDrive" style="'+inp+'">'
    +'<option value="">しない（実GPS）</option>'
    +[3,5,10].map(s=>'<option value="'+s+'"'+(DEBUG_DRIVE===s?' selected':'')+'>'+s+'秒で1駅</option>').join('')
    +'</select> <label style="font-size:16px"><input type="checkbox" id="dbgWrong"'+(DEBUG_WRONG?' checked':'')+'> わざと逸走（乗り間違い警告のテスト）</label>'
    +'<div class="label" style="margin-top:14px">💡 LEDプレビュー（系統を選ぶ→行先は「ぜんぶ」か1つ）</div>'
    +'<select id="dbgLedRoute" style="'+inp+' max-width:100%"><option value="">しない</option>'
    +GD.routes.map(r=>'<option value="'+esc(r)+'"'+(r===ledR?' selected':'')+'>'+esc(r)+'</option>').join('')
    +'</select> <select id="dbgLedHs" style="'+inp+' max-width:100%"><option value="">ぜんぶの行先</option></select>'
    +'<button class="btn btn-blue" onclick="applyDbg()" style="margin-top:16px">この設定にする（再読み込み）</button>'
    +'<button class="btn btn-gray" onclick="clearDbg()">すべて解除（通常に戻す）</button>'
    +'<button class="btn btn-gray" onclick="document.getElementById(&quot;dbgPanel&quot;).style.display=&quot;none&quot;">とじる</button>'
    +'</div>';
  document.body.appendChild(p);
  // 系統を選ぶと、その系統の行先だけがプルダウンに入る（覚えていなくても選べる）
  const lr=document.getElementById('dbgLedRoute'), lh=document.getElementById('dbgLedHs');
  function fillHs(){
    const rt=lr.value;
    let opts='<option value="">ぜんぶの行先</option>';
    if(rt){
      const ri=GD.routes.indexOf(rt);
      const hsSet=new Set();
      GD.trips.forEach(tr=>{ if(tr[0]===ri) hsSet.add(GD.headsigns[tr[3]]); });
      [...hsSet].sort().forEach(h=>{ opts+='<option value="'+esc(h)+'"'+(h===ledH?' selected':'')+'>'+esc(h)+'</option>'; });
    }
    lh.innerHTML=opts;
  }
  lr.onchange=fillHs;
  fillHs();
}
function applyDbg(){
  const g=id=>document.getElementById(id);
  const q=[];
  const d=g('dbgDate').value, tm=g('dbgTime').value;
  if(tm) q.push('at='+(d? d.replace(/-/g,'')+'-' :'')+tm.replace(':',''));
  const st=g('dbgStop').value.trim();
  if(st){
    if(!nameToPoles[st]){
      const f=fuzzy(st);
      g('dbgStopMsg').textContent='⚠️ そのバス停名が見つかりません'+(f.length?'。似た名前：'+f.join('、'):'');
      g('dbgStopMsg').style.color='#c0392b';
      return; // 間違った名前では再読み込みしない
    }
    const pl=g('dbgPole').value.trim();
    q.push('gps='+encodeURIComponent(st+(pl?'|'+pl:'')));
  }
  const dr=g('dbgDrive').value;
  if(dr) q.push('drive='+dr);
  if(g('dbgWrong').checked) q.push('wrong=1');
  const ledR2=g('dbgLedRoute').value, ledH2=g('dbgLedHs').value;
  if(ledR2) q.push('led='+encodeURIComponent(ledR2+(ledH2?'|'+ledH2:'')));
  location.href=location.pathname+(q.length?'?'+q.join('&'):'');
}
function clearDbg(){ location.href=location.pathname; }
try{ // タイトルの🚌を3回タップ（1.5秒以内の連打）で開く。ふつうに使う人は気づかない
  const bi=document.getElementById('busIcon');
  let dbgCnt=0, dbgTm=0;
  if(bi) bi.onclick=function(){
    const nw=Date.now();
    if(nw-dbgTm>1500) dbgCnt=0;
    dbgTm=nw; dbgCnt++;
    if(dbgCnt>=3){ dbgCnt=0; openDbg(); }
  };
}catch(e){}
async function debugLedPreview(){
  let led=null;
  try{ led=new URLSearchParams(location.search).get('led'); }catch(e){}
  if(!led) return;
  const sp=led.split('|');
  const rt=sp[0], one=sp[1]||null;
  const ri=GD.routes.indexOf(rt);
  const hset=new Set();
  if(ri>=0) GD.trips.forEach(tr=>{ if(tr[0]===ri) hset.add(GD.headsigns[tr[3]]); });
  const list=one? [one] : [...hset].sort();
  try{ await pmReady; }catch(e){}
  const R=document.getElementById('result');
  R.innerHTML='';
  const head=document.createElement('div');
  head.className='card';
  head.innerHTML='<b>🔧 LEDプレビュー：'+esc(rt)+'</b><div class="small">URLの ?led= を消すと通常表示に戻ります</div>'
    +(list.length===0?'<div class="warn" style="margin-top:8px">その系統名が見つかりません（GTFS表記そのまま・全角数字に注意。例：ゆとりーとライン、幹栄２）</div>':'');
  R.appendChild(head);
  list.forEach(h=>{
    const hp=parseHS(h);
    const card=document.createElement('div');
    card.className='card';
    const lab=document.createElement('div');
    lab.className='small';
    lab.textContent='['+rt+'] '+h;
    card.appendChild(lab);
    const box=document.createElement('div');
    box.className='led';
    try{ box.appendChild(ledCanvas(rt,hp,enOf(hp.d)||'',h)); }
    catch(e){ box.textContent='描画エラー：'+e; }
    card.appendChild(box);
    // メーグル・Ｃ－７５８：登録済みの区間LEDを全部並べる（乗車バス停の範囲ラベル付き。実車照合用）
    const segReg=SEG_LED[rt];
    if(segReg && segReg[h]){
      const seen=new Map(); // spec→[最初のキー,最後のキー]
      Object.keys(segReg[h]).forEach(k2=>{
        const sp2=segReg[h][k2];
        if(!seen.has(sp2)) seen.set(sp2,[k2,k2]); else seen.get(sp2)[1]=k2;
      });
      seen.forEach((range,sp2)=>{
        const sl=document.createElement('div');
        sl.className='small'; sl.style.marginTop='8px';
        const fk=s=>s.replace(/#1$/,'').replace(/#(\d+)$/,'（$1回目）');
        sl.textContent='乗車：'+fk(range[0])+(range[0]!==range[1]?' 〜 '+fk(range[1]):'');
        card.appendChild(sl);
        const bx=document.createElement('div');
        bx.className='led';
        try{ bx.appendChild(ledCanvas(rt,hp,'',h,sp2)); }catch(e){ bx.textContent='描画エラー：'+e; }
        card.appendChild(bx);
      });
    }
    const cols=sideColsFor(rt,h);
    if(cols){ // 側面表示が登録済みの便はそれも出す
      const sb=document.createElement('div');
      sb.className='led'; sb.style.display='block'; sb.style.marginTop='8px';
      try{ sb.appendChild(sideCanvas(rt,hp,enOf(hp.d)||'',cols)); }catch(e){}
      card.appendChild(sb);
      const sl=document.createElement('div');
      sl.className='small'; sl.style.textAlign='center'; sl.textContent='側面表示';
      card.appendChild(sl);
    }
    R.appendChild(card);
  });
}

// ================== 時刻の自動追従（v3.12） ==================
// 「あと約○分」を現在時刻に合わせて毎分更新する（調べた瞬間の値で固定しない＝勘違いして遅刻するのを防ぐ：北村さん 2026-07-18）。
// 表示中の便が出発してしまったら、次の便で画面ごと描き直す。降車ナビ中は到着予測の残り分だけ静かに更新。
let _tickMin=-1;
setInterval(function(){
  if(ride){ // 降車ナビ中：到着予測の「あと約○分」が変わった時だけ再描画（音声・GPSには触らない）
    if(!ride.arrived && rideRemMin()!==ride._remShown) rideRender();
    return;
  }
  if(DEBUG_AT) return; // 日時固定デバッグ中は時間を進めない
  const n=new Date(), nm=n.getHours()*60+n.getMinutes();
  if(nm===_tickMin) return; // 分が変わった時だけ動く
  _tickMin=nm;
  if(!dest||!here||window._nextDep==null) return;
  const w=window._nextDep-(nm+walkMin);
  // 定刻を過ぎても15分間は同じ便を「（＋○分おくれ？）」表示で保持する
  // （バスは始発以降あまり定刻どおりに走らない：北村さん 2026-07-18。黙って次の便に進むと待っている人が混乱する）
  if(w<-15||w>720){ render(); return; } // 15分待っても来なければ次の便へ（または日付またぎ）
  document.querySelectorAll('.waitmin').forEach(function(el){
    el.innerHTML = w>=0 ? t('waitin',w) : '<span style="color:var(--red)">'+t('waitlate',-w)+'</span>';
  });
}, 5000);

applyStatic();
render();
debugLedPreview();
</script>
