<html lang="ja">

<meta charset="UTF-8">

<title>これ乗っていいの？ – 名古屋市バス</title>

<style>
  @font-face{font-family:'PM10'; src:url('PixelMplus10-Regular.ttf') format('truetype');}
  @font-face{font-family:'PM12'; src:url('PixelMplus12-Regular.ttf') format('truetype');}
  :root{
    --blue:#1a6fd4; --green:#0d7a4f; --green-bg:#e3f4ec;
    --red:#c0392b; --red-bg:#fdecea; --ink:#1b1b1b; --muted:#666;
    --led:#ff9500; --card:#fff; --bg:#f2f1ec;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--ink);
       font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif; font-size:20px; line-height:1.6;}
  .wrap{max-width:520px; margin:0 auto; padding:16px 14px 60px;}
  h1{font-size:22px; margin:8px 0 2px; text-align:center;}
  .sub{text-align:center; color:var(--muted); font-size:13px; margin:0 0 10px;}
  #langbar{text-align:center; margin-bottom:14px;}
  #langbar select{font-size:16px; padding:6px 10px; border:1px solid #ccc; border-radius:10px; background:#fff;}
  .card{background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px;
        box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .label{font-size:16px; color:var(--muted); margin-bottom:6px;}
  .bigval{font-size:28px; font-weight:700;}
  input[type=text]{width:100%; font-size:22px; padding:12px; border:2px solid #ccc; border-radius:10px;}
  input[type=text]:focus{border-color:var(--blue); outline:none;}
  .btn{display:block; width:100%; font-size:22px; font-weight:700; padding:14px;
       border:none; border-radius:12px; cursor:pointer; margin-top:10px;}
  .btn-blue{background:var(--blue); color:#fff;}
  .btn-gray{background:#e5e3dc; color:var(--ink); font-weight:500; font-size:16px; padding:10px;}
  .suggest{margin-top:6px;}
  .suggest button{display:block; width:100%; text-align:left; font-size:21px; padding:12px;
       background:#fff; border:1px solid #ddd; border-radius:10px; margin-top:6px; cursor:pointer;}
  .suggest button:active{background:#eef4fd;}
  .led{background:#141414; border:4px solid #3a3a3a; border-radius:12px; padding:10px;
       display:flex; align-items:stretch; gap:10px; min-height:86px;
       background-image:radial-gradient(circle, rgba(255,150,0,.08) 1px, transparent 1.6px);
       background-size:5px 5px;}
  .lbadge{background:#1a6fd4; color:#fff; border-radius:6px; font-size:22px; padding:3px 6px; flex-shrink:0; line-height:1; align-self:center;}
  .lroute{border:2.5px solid var(--led); border-radius:4px; padding:2px 8px; text-align:center; line-height:1.1; flex-shrink:0;
          display:flex; align-items:center; justify-content:center; gap:3px; align-self:stretch;}
  .lroute.stack{flex-direction:column; gap:0;}
  .lroute .k{font-size:17px;}
  .lroute .n{font-size:30px;}
  .lroute .row2{display:flex; align-items:center; gap:3px;}
  .kanbox{border:1.5px solid var(--led); border-radius:3px; font-size:13px; padding:0 3px; line-height:1.3;}
  .lmain{flex:1; text-align:center; min-width:0; display:flex; flex-direction:column; justify-content:center;}
  .ltop{font-size:16px; letter-spacing:.35em;}
  .lvia{font-size:18px; letter-spacing:.02em;}
  .ldest{font-size:38px; letter-spacing:.06em;}
  .lromaji{font-size:15px; margin-top:2px; font-weight:700; text-align:right; padding-right:8px;}
  .lroute,.kanbox,.ltop,.lvia,.ldest,.lromaji{color:var(--led); font-family:"Hiragino Kaku Gothic Std","Yu Gothic",sans-serif; font-weight:800;}
  .ok-title{color:var(--green); font-weight:700; font-size:18px; margin:14px 0 6px;}
  .ng-title{color:var(--red); font-weight:700; font-size:18px; margin:14px 0 6px;}
  .buslist{border-radius:10px; padding:8px 12px; font-size:20px;}
  .buslist.ok{background:var(--green-bg);} .buslist.ng{background:var(--red-bg);}
  .buslist div{padding:6px 0; border-bottom:1px dashed rgba(0,0,0,.12);}
  .buslist div:last-child{border-bottom:none;}
  .t{display:inline-block; min-width:64px; font-weight:700; font-variant-numeric:tabular-nums;}
  .rt{display:inline-block; background:#fff; border:1px solid #bbb; border-radius:6px;
      padding:0 6px; font-size:15px; margin-right:6px;}
  .warn{background:#fff5d6; border:2px solid #e5b100; border-radius:12px; padding:14px; font-size:19px; font-weight:700;}
  .move{font-size:26px; color:var(--blue);}
  .pill{display:inline-block; border-radius:20px; padding:2px 12px; font-size:15px; font-weight:700;}
  .pill.ok{background:var(--green-bg); color:var(--green);} .pill.ng{background:var(--red-bg); color:var(--red);}
  .small{font-size:14px; color:var(--muted);}
  .step{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .stepnum{background:var(--blue); color:#fff; border-radius:50%; width:28px; height:28px;
      display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0;}
  a.link{color:var(--blue);}
  footer{margin-top:24px; text-align:center;}
</style>

<body>
<div class="wrap">
  <h1>🚌 これ乗っていいの？</h1>
  <p class="sub" id="sub">名古屋市バス版プロトタイプ</p>
  <div id="langbar"></div>

  <div class="card" id="cardDest">
    <div class="step"><div class="stepnum">1</div><div class="label" style="margin:0" id="lblStep1">降りたいバス停（目的地）</div></div>
    <div id="destShow" style="display:none">
      <span class="bigval" id="destName"></span>
      <button class="btn btn-gray chg" onclick="resetDest()">変更する</button>
    </div>
    <div id="destPick">
      <input type="text" id="destInput" placeholder="例：四軒家" oninput="suggest('dest')">
      <div class="suggest" id="destSug"></div>
    </div>
  </div>

  <div class="card" id="cardHere">
    <div class="step"><div class="stepnum">2</div><div class="label" style="margin:0" id="lblStep2">いまいるバス停</div></div>
    <div id="hereShow" style="display:none">
      <span class="bigval" id="hereName"></span>
      <button class="btn btn-gray chg" onclick="resetHere()">変更する</button>
    </div>
    <div id="herePick">
      <button class="btn btn-blue" id="btnGps" onclick="useGPS()">📍 いまの場所からさがす</button>
      <div class="small" style="text-align:center; margin:8px 0 4px" id="lblOr">または名前でさがす</div>
      <input type="text" id="hereInput" placeholder="例：守山プール" oninput="suggest('here')">
      <div class="suggest" id="hereSug"></div>
      <div class="small" id="gpsMsg"></div>
    </div>
  </div>

  <div id="result"></div>

  <footer class="small">
    出典：名古屋市交通局「市バスGTFS-JPデータ」(CC BY 4.0) 2026年3月28日改正<br>
    <span id="footNote">時刻表ベースの案内です。遅延には対応していません（プロトタイプ v2.1）。</span>
  </footer>
</div>

let lang = localStorage.getItem('lang') || 'ja';
if(!I18N[lang]) lang='ja';
function t(k){
  let s=(I18N[lang]&&I18N[lang][k]!==undefined)?I18N[lang][k]:I18N.ja[k];
  for(let i=1;i<arguments.length;i++){ s=s.split('{'+(i-1)+'}').join(arguments[i]); }
  return s;
}
// バス停名の表示：日本語以外ではローマ字を併記（現地の表示は日本語なので両方見せる）
function sn(name){
  if(lang==='ja') return name;
  const e=GD.en&&GD.en[name];
  return e? name+' ('+e+')' : name;
}
function enOf(name){ return (GD.en&&GD.en[name])||''; }

// ================== データ索引 ==================
const nameToPoles = {};
GD.stops.forEach((s,i)=>{ (nameToPoles[s[0]] = nameToPoles[s[0]]||[]).push(i); });
const stopNames = Object.keys(nameToPoles);

const poleTrips = {};
GD.trips.forEach((t2,ti)=>{ GD.patterns[t2[1]].forEach(si=>{ (poleTrips[si]=poleTrips[si]||new Set()).add(ti); }); });

let dest = localStorage.getItem('dest') || null;
let here = null;
let myPos = null;
let nearestPole = null;
let walkMin = 0;

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ================== 検索（漢字・ひらがな・カタカナ・ローマ字・あいまい） ==================
function toHira(s){ return s.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)); }
function fuzzy(q){
  const qs=[...q], qh=[...toHira(q)];
  return stopNames.map(n=>{
    const ns=[...n], ys=[...(GD.yomi[n]||'')];
    let c=0; qs.forEach(ch=>{ if(ns.includes(ch)) c++; });
    let cy=0; qh.forEach(ch=>{ if(ys.includes(ch)) cy++; });
    let cm=0; qh.forEach(ch=>{ if(ns.includes(ch)||ys.includes(ch)) cm++; });
    const sc=Math.max(c/Math.max(qs.length,ns.length), ys.length?cy/Math.max(qh.length,ys.length):0, cm/qh.length*0.9);
    return {n, sc};
  }).filter(x=>x.sc>=0.5).sort((a,b)=>b.sc-a.sc).slice(0,5).map(x=>x.n);
}
function suggest(kind){
  const q = document.getElementById(kind+'Input').value.trim();
  const box = document.getElementById(kind+'Sug');
  box.innerHTML='';
  if(q.length<1) return;
  const qh = toHira(q), ql = q.toLowerCase();
  let hits = stopNames.filter(n=> n.includes(q) || (GD.yomi[n]||'').includes(qh) || enOf(n).toLowerCase().includes(ql) ).slice(0,8);
  if(hits.length===0 && q.length>=2){
    hits = fuzzy(q);
    if(hits.length){
      const note=document.createElement('div');
      note.className='small';
      note.textContent=t('notfound');
      box.appendChild(note);
    }
  }
  hits.forEach(n=>{
    const b=document.createElement('button');
    b.textContent=sn(n);
    b.onclick=()=>{ kind==='dest'?setDest(n):setHere(n,null); };
    box.appendChild(b);
  });
}
function setDest(n){ dest=n; localStorage.setItem('dest',n); render(); }
function resetDest(){ dest=null; localStorage.removeItem('dest'); render(); }
function setHere(n,pole){ here=n; nearestPole=pole; walkMin=0; render(); }
function resetHere(){ here=null; nearestPole=null; myPos=null; walkMin=0; render(); }
function goNearby(pi,w){ here=GD.stops[pi][0]; nearestPole=pi; walkMin=w; render(); window.scrollTo(0,0); }

// ================== 地理計算 ==================
function dist(la1,lo1,la2,lo2){
  const R=6371000, d=Math.PI/180;
  const a=Math.sin((la2-la1)*d/2)**2 + Math.cos(la1*d)*Math.cos(la2*d)*Math.sin((lo2-lo1)*d/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function bearing(la1,lo1,la2,lo2){
  const d=Math.PI/180;
  const y=Math.sin((lo2-lo1)*d)*Math.cos(la2*d);
  const x=Math.cos(la1*d)*Math.sin(la2*d)-Math.sin(la1*d)*Math.cos(la2*d)*Math.cos((lo2-lo1)*d);
  const deg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  return t('dirs')[Math.round(deg/45)%8];
}

function useGPS(){
  const msg=document.getElementById('gpsMsg');
  msg.textContent=t('locating');
  navigator.geolocation.getCurrentPosition(p=>{
    myPos={lat:p.coords.latitude, lon:p.coords.longitude};
    let best=-1,bd=1e9;
    GD.stops.forEach((s,i)=>{ const dd=dist(myPos.lat,myPos.lon,s[1],s[2]); if(dd<bd){bd=dd;best=i;} });
    if(bd>800){ msg.textContent=t('nostop'); return; }
    setHere(GD.stops[best][0], best);
  }, e=>{ msg.textContent=t('noloc'); });
}

// ================== ダイヤ判定 ==================
function activeServices(dateObj){
  const y=dateObj.getFullYear(), m=('0'+(dateObj.getMonth()+1)).slice(-2), dd=('0'+dateObj.getDate()).slice(-2);
  const key=''+y+m+dd;
  const dow=(dateObj.getDay()+6)%7;
  const act=new Set();
  GD.calendar.forEach((days,i)=>{ if(days[dow]) act.add(i); });
  const ex=GD.calendarDates[key];
  if(ex){ ex.add.forEach(i=>act.add(i)); ex.del.forEach(i=>act.delete(i)); }
  return act;
}
function judge(poleIdx, destName, act, nowMin){
  const destSet=new Set(nameToPoles[destName]);
  const ok=[], ng=new Map();
  const set=poleTrips[poleIdx]; if(!set) return {ok,ng:[]};
  set.forEach(ti=>{
    const [r,p,s,h,times]=GD.trips[ti];
    if(!act.has(s)) return;
    const pat=GD.patterns[p];
    const i=pat.indexOf(poleIdx);
    if(i<0 || i===pat.length-1) { return; }
    const depart=times[i];
    if(depart<nowMin) return;
    let goes=false, arr=0;
    for(let k=i+1;k<pat.length;k++){ if(destSet.has(pat[k])){goes=true; arr=times[k]; break;} }
    if(goes) ok.push({t:depart, arr, r:GD.routes[r], h:GD.headsigns[h]});
    else ng.set(GD.routes[r]+'|'+GD.headsigns[h], {r:GD.routes[r], h:GD.headsigns[h]});
  });
  ok.sort((a,b)=>a.t-b.t);
  return {ok, ng:[...ng.values()]};
}

function fmt(min){ let h=Math.floor(min/60); if(h>=24)h-=24; return ('0'+h).slice(-2)+':'+('0'+min%60).slice(-2); }
function parseHS(h){ const m=h.match(/^(.+?)（(.+)）$/); return m?{d:m[1],v:m[2]}:{d:h,v:''}; }
function poleLabel(i){ const pc=GD.stops[i][3]; return t('pole', pc||'?'); }
// 行先のローマ字（日本語以外のとき）
function romajiHS(hs){
  if(lang==='ja') return '';
  const ed=enOf(hs.d);
  if(!ed) return '';
  let ev='';
  if(hs.v){
    const vn=hs.v.replace(/経由.*$/,'').trim();
    const e2=enOf(vn);
    if(e2) ev=' '+t('via',e2);
  }
  return ed+ev;
}

// ================== 画面 ==================
function render(){
  document.getElementById('destShow').style.display = dest?'block':'none';
  document.getElementById('destPick').style.display = dest?'none':'block';
  if(dest) document.getElementById('destName').textContent='🏁 '+sn(dest);
  document.getElementById('hereShow').style.display = here?'block':'none';
  document.getElementById('herePick').style.display = here?'none':'block';
  if(here) document.getElementById('hereName').textContent='📍 '+sn(here);
  document.getElementById('destSug').innerHTML=''; document.getElementById('hereSug').innerHTML='';
  const R=document.getElementById('result');
  R.innerHTML='';
  if(!dest||!here) return;
  if(dest===here){ R.innerHTML='<div class="card">'+t('same')+'</div>'; return; }

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes()+walkMin;
  const act=activeServices(now);
  const poles=nameToPoles[here];
  let pendingLed=null;

  const verdicts=poles.map(pi=>({pi, ...judge(pi,dest,act,nowMin)}));
  const goodPoles=verdicts.filter(v=>v.ok.length>0);
  goodPoles.forEach(v=>{
    let bt=null;
    v.ok.forEach(b=>{ if(!bt || b.arr<bt.arr || (b.arr===bt.arr && b.t<bt.t)) bt=b; });
    v.best=bt;
  });
  goodPoles.sort((a,b)=> a.best.arr-b.best.arr || a.best.t-b.best.t);

  let html='';
  let mapSpec=null;

  if(goodPoles.length===0){
    html+='<div class="card"><div class="warn">'+t('nodirect', esc(sn(here)), esc(sn(dest)))+'</div>';
    let ref;
    if(myPos){ ref=[myPos.lat,myPos.lon]; }
    else { ref=[poles.reduce((a,i)=>a+GD.stops[i][1],0)/poles.length, poles.reduce((a,i)=>a+GD.stops[i][2],0)/poles.length]; }
    const cands=[];
    GD.stops.forEach((s,i)=>{
      if(s[0]===here) return;
      const dd=dist(ref[0],ref[1],s[1],s[2]);
      if(dd>800) return;
      const w=Math.ceil(dd/67);
      const v=judge(i,dest,act,nowMin+w);
      if(v.ok.length) cands.push({pi:i, dd:Math.round(dd), w, dep:v.ok[0].t});
    });
    if(cands.length){
      cands.sort((a,b)=>a.dd-b.dd);
      const seen=new Set(), top=[];
      cands.forEach(c=>{ const n=GD.stops[c.pi][0]; if(!seen.has(n)){seen.add(n); top.push(c);} });
      html+='<div class="label" style="margin-top:12px">'+t('walkable')+'</div><div class="suggest">';
      top.slice(0,3).forEach(c=>{
        const s=GD.stops[c.pi];
        const dir=bearing(ref[0],ref[1],s[1],s[2]);
        html+='<button onclick="goNearby('+c.pi+','+c.w+')">'+
          '<b>'+esc(sn(s[0]))+' '+poleLabel(c.pi)+'</b><span class="small" id="lm'+c.pi+'"></span><br>'+
          '<span class="small">'+t('towalk', dir, c.dd, c.w, fmt(c.dep))+'</span></button>';
      });
      html+='</div><div class="small" style="margin-top:6px">'+t('tapswitch')+'</div>';
      html+='<div id="lmap" style="height:280px; border-radius:10px; margin-top:10px"></div>';
      mapSpec={markers:top.slice(0,3).map(c=>{
        const s=GD.stops[c.pi];
        return {pi:c.pi, lat:s[1],lon:s[2],label:s[3]||'?',color:'#0d7a4f',

// ================== LEDドットマトリクス・ジェネレーター ==================
// 文字列→ビットマップ（高さhドット）。ブラウザのcanvasでレンダリングして2値化
// ドットの太さ：既定は自動調整（フォントの濃さを測って決定）。URLの ?th=3〜7 で手動上書き可
const DOT_TH=(function(){ try{ const v=parseInt(new URLSearchParams(location.search).get('th')); return (v>=2&&v<=8)?v:0; }catch(e){ return 0; } })();
function tbits(text, h, ls){
  // 3倍サイズで描き、3x3ブロックの点灯数で間引く（くっきりドット化）
  const S=3;
  const c=document.createElement('canvas');
  const font=(h*S)+'px "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif';
  let ctx=c.getContext('2d');
  ctx.font=font;
  let w=0;
  if(ls>0){ for(const ch of text){ w+=Math.ceil(ctx.measureText(ch).width)+ls*S; } w-=ls*S; }
  else w=Math.ceil(ctx.measureText(text).width);
  w=Math.max(w,1);
  c.width=w+S*2; c.height=h*S;
  ctx=c.getContext('2d');
  ctx.font=font; ctx.fillStyle='#fff'; ctx.textBaseline='alphabetic';
  const m=ctx.measureText(text);
  const asc=(m.actualBoundingBoxAscent!==undefined)?m.actualBoundingBoxAscent:h*S*0.8;
  const desc=(m.actualBoundingBoxDescent!==undefined)?m.actualBoundingBoxDescent:h*S*0.2;
  const y=Math.round(asc+(h*S-(asc+desc))/2);
  if(ls>0){ let x=0; for(const ch of text){ ctx.fillText(ch,x,y); x+=Math.ceil(ctx.measureText(ch).width)+ls*S; } }
  else ctx.fillText(text,0,y);
  const d=ctx.getImageData(0,0,c.width,c.height).data;
  const W2=Math.floor(c.width/S);
  // 1パス目：各ブロックの点灯サブピクセル数を数える
  const counts=[]; let sum=0, nz=0;
  for(let yy=0;yy<h;yy++){
    const row=[];
    for(let xx=0;xx<W2;xx++){
      let cnt=0;
      for(let dy=0;dy<S;dy++)for(let dx=0;dx<S;dx++){
        if(d[((yy*S+dy)*c.width+(xx*S+dx))*4]>128) cnt++;
      }
      row.push(cnt);
      if(cnt>0){ sum+=cnt; nz++; }
    }
    counts.push(row);
  }
  // しきい値の自動調整：フォントが太い端末ほど高く（較正：細字5.67→4.5、太字6.45→6.0）
  let th=DOT_TH;
  if(!th){
    const mean=nz? sum/nz : 5;
    th=Math.max(3, Math.min(7, Math.round(1.9*mean-6.3)));
  }
  const bits=[]; let maxx=0;
  for(let yy=0;yy<h;yy++){
    const row=[];
    for(let xx=0;xx<W2;xx++){
      const v=counts[yy][xx]>=th?1:0;
      row.push(v); if(v&&xx>maxx)maxx=xx;
    }
    bits.push(row);
  }
  return {h:h, w:maxx+1, bits:bits};
}

function rtext(text){
  const bits=[[],[],[],[],[],[],[]];
  for(const ch of text){
    const g=F57[ch]||F57[ch.toUpperCase&&ch.toUpperCase()]||F57[' '];
    for(let y=0;y<7;y++){
      for(let b=4;b>=0;b--) bits[y].push((g[y]>>b)&1);
      bits[y].push(0);
    }
  }
  return {h:7, w:bits[0].length, bits:bits};
}
function zenNum(s){ return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }
function scale2(r){
  const bits=[];
  for(let y=0;y<r.h;y++){
    const row=[];
    for(let x=0;x<r.w;x++){ row.push(r.bits[y][x], r.bits[y][x]); }
    bits.push(row); bits.push(row.slice());
  }
  return {h:r.h*2, w:r.w*2, bits:bits};
}
// 系統番号の数字：5x7フォントの2倍拡大（14ドット高・字間タイト・端末非依存）
function numBits(num){ return scale2(rtext(zenNum(num))); }

// ===== PixelMplus（ドット絵日本語フォント）対応：あれば漢字も真のドット描画に =====
let pmUnit=0, pmFamily='';
const PM_FORCE=(function(){ try{ return new URLSearchParams(location.search).get('pm'); }catch(e){ return null; } })();
const pmReady=(async()=>{
  if(PM_FORCE==='0') return; // ?pm=0 でドットフォント強制OFF
  try{ if(document.fonts&&document.fonts.load) await document.fonts.load('10px PM10','駅'); }catch(e){}
  if(document.fonts&&document.fonts.check&&document.fonts.check('10px PM10')){ pmUnit=10; pmFamily='PM10'; }
  else{
    try{ if(document.fonts&&document.fonts.load) await document.fonts.load('12px PM12','駅'); }catch(e){}
    if(document.fonts&&document.fonts.check&&document.fonts.check('12px PM12')){ pmUnit=12; pmFamily='PM12'; }
  }
  // 描画品質の自己検査：この端末でにじむならドットフォントをやめて従来方式へ
  // （基準：「田」のインク密度。カリカリ=0.50前後、にじみ=0.7超。?pm=1で検査スキップ）
  if(pmUnit && PM_FORCE!=='1'){
    try{
      const t=pmbits('田',0);
      let lit=0; t.bits.forEach(r=>r.forEach(v=>{ if(v)lit++; }));
      const density=lit/(Math.max(t.w,1)*pmUnit);
      if(density>0.62){ console.warn('PixelMplus描画がにじむ環境のため従来方式に切替 density='+density.toFixed(2)); pmUnit=0; pmFamily=''; }
    }catch(e){ pmUnit=0; pmFamily=''; }
  }
})();
function pmbits(text, ls){
  // ドットフォントは1マス=1pxに揃う設計。基準線を整数ピクセルに置いてにじみを防ぐ
  const u=pmUnit;
  const c=document.createElement('canvas');
  const font=u+'px '+pmFamily;
  let ctx=c.getContext('2d');
  ctx.font=font;
  let w=0;
  if(ls>0){ for(const ch of text){ w+=Math.ceil(ctx.measureText(ch).width)+ls; } w-=ls; }
  else w=Math.ceil(ctx.measureText(text).width);
  w=Math.max(w,1);
  c.width=w+4; c.height=u+6;
  ctx=c.getContext('2d');
  ctx.font=font; ctx.fillStyle='#fff'; ctx.textBaseline='alphabetic';
  if(ctx.fontKerning!==undefined) ctx.fontKerning='none';
  const mm=ctx.measureText(text);
  const asc=Math.ceil((mm.actualBoundingBoxAscent!==undefined)?mm.actualBoundingBoxAscent:u*0.85);
  const by=asc+2; // 整数ベースライン
  // Windowsは字送りが小数ピクセルになり横ににじむ→1文字ずつ整数位置に描く
  { let x=0; for(const ch of text){ ctx.fillText(ch,x,by); x+=Math.round(ctx.measureText(ch).width)+(ls||0); } }
  const d=ctx.getImageData(0,0,c.width,c.height).data;
  const lit=(xx,yy)=>d[(yy*c.width+xx)*4]>128;
  // 実際に点灯した行の範囲を検出して高さuに切り出す
  let r0=-1,r1=-1;
  for(let yy=0;yy<c.height;yy++){
    let any=false;
    for(let xx=0;xx<c.width;xx++){ if(lit(xx,yy)){any=true;break;} }
    if(any){ if(r0<0)r0=yy; r1=yy; }
  }
  if(r0<0){ return {h:u,w:1,bits:Array.from({length:u},()=>[0])}; }
  const gh=r1-r0+1;
  const start=(gh<=u)? r0-Math.floor((u-gh)/2) : r0;
  const bits=[]; let maxx=0;
  for(let yy=0;yy<u;yy++){
    const sy=start+yy;
    const row=[];
    for(let xx=0;xx<c.width;xx++){
      const v=(sy>=0&&sy<c.height&&lit(xx,sy))?1:0;
      row.push(v); if(v&&xx>maxx)maxx=xx;
    }
    bits.push(row);
  }
  return {h:u, w:Math.max(maxx+1,1), bits:bits};
}
// 日本語ビットマップ：PixelMplusがあればドットフォント、なければ従来の自動変換
function jb(text,h,ls){
  if(pmUnit){
    if(h<16) return pmbits(text, ls||0);
    if(pmUnit===10) return scale2(pmbits(text,0));
  }
  return tbits(text,h,ls||0);
}
function bmNew(w,h){ const g=[]; for(let y=0;y<h;y++)g.push(new Array(w).fill(0)); return {w,h,g}; }
function bmBlit(m,tb2,x0,y0){
  for(let y=0;y<tb2.h;y++)for(let x=0;x<tb2.w;x++)
    if(tb2.bits[y][x]&&x0+x>=0&&x0+x<m.w&&y0+y>=0&&y0+y<m.h) m.g[y0+y][x0+x]=1;
}
function bmRect(m,x0,y0,x1,y1){
  for(let x=x0;x<=x1;x++){ if(y0>=0&&y0<m.h){m.g[y0][x]=1;} if(y1>=0&&y1<m.h){m.g[y1][x]=1;} }
  for(let y=y0;y<=y1;y++){ if(x0>=0&&x0<m.w){m.g[y][x0]=1;} if(x1>=0&&x1<m.w){m.g[y][x1]=1;} }
}
function ledCanvas(route, hs, rj){
  const H=30;
  // 系統ボックス部品
  const rp=route.match(/^(.+?)([０-９0-9]+)$/);
  let style,pre,num;
  if(rp){ pre=rp[1]; num=rp[2];
    style = pre==='基幹' ? 'kikan' : (pre.length>1&&pre.charAt(0)==='幹') ? 'kan3' : 'h';
    if(style==='kan3') pre=pre.slice(1);
  } else if(route.endsWith('巡回')){ pre=route.slice(0,-2); num='巡回'; style='h2'; }
  else { pre=''; num=route; style='solo'; }
  const isNum=/^[０-９0-9]+$/.test(num||'');
  let k=null,kan=null,n=null,bw;
  if(style==='h'){ k=jb(pre,10,0); n=isNum?numBits(num):jb(num,16,0); bw=k.w+n.w+7; }
  else if(style==='h2'){ k=jb(pre,10,0); n=jb(num,10,0); bw=k.w+n.w+7; }
  else if(style==='kikan'){ k=jb(pre,9,3); n=isNum?numBits(num):jb(num,13,0); bw=Math.max(k.w,n.w)+6; }
  else if(style==='kan3'){ k=jb(pre,9,0); kan=(pmUnit===10)?pmbits('幹',0):tbits('幹',7,0); n=isNum?numBits(num):jb(num,12,0); bw=Math.max(k.w,kan.w+n.w+6)+6; }
  else { n=jb(num,12,0); bw=n.w+8; }
  // 行先部品（◯まわりは上段へ）
  let topLine='', viaName='';
  if(hs.v){
    let v=hs.v.replace('経由','').trim();
    const mw=v.match(/(左まわり|右まわり|大まわり|小まわり)/);
    if(mw){ topLine=mw[1]; v=v.replace(mw[1],'').trim(); }
    viaName=v;
  }
  let tb2=null,db,vb=null,rb=null;
  if(topLine) tb2=jb(topLine,9,5);
  db=jb(hs.d, topLine?14:18, 0);
  if(viaName) vb=jb(viaName+'・', topLine?9:11, 0);
  if(rj) rb=rtext(rj);  // ローマ字は内蔵5x7ドットフォント（端末非依存）
  const destY = tb2? tb2.h+1 : 1;
  const romY = Math.min(H-7, destY+db.h+2);
  const content=(vb?vb.w:0)+db.w;
  const need=Math.max(content, tb2?tb2.w:0, rb?rb.w:0);
  const W=bw+3+2+need+3;
  const m=bmNew(W,H);
  // 箱
  bmRect(m,0,0,bw,H-1);
  if(style==='h'){ bmBlit(m,k,3,Math.floor((H-k.h)/2)+3); bmBlit(m,n,3+k.w+2,Math.floor((H-n.h)/2)); }
  else if(style==='h2'){ bmBlit(m,k,3,Math.floor((H-k.h)/2)); bmBlit(m,n,3+k.w+2,Math.floor((H-n.h)/2)); }
  else if(style==='kikan'){ bmBlit(m,k,Math.floor((bw-k.w)/2)+1,3); bmBlit(m,n,Math.floor((bw-n.w)/2)+1,H-3-n.h); }
  else if(style==='kan3'){
    bmBlit(m,k,Math.floor((bw-k.w)/2)+1,2);
    const x=Math.floor((bw-(kan.w+3+n.w))/2)+1;
    const rTop=H-4-(kan.h+3);
    bmRect(m,x-1,rTop,x+kan.w,H-4);
    bmBlit(m,kan,x,rTop+2);
    bmBlit(m,n,x+kan.w+3,H-3-n.h);
  }
  else { bmBlit(m,n,4,Math.floor((H-n.h)/2)); }
  // 行先エリア
  const areaX=bw+3, areaW=W-areaX;
  if(tb2) bmBlit(m,tb2,areaX+Math.max(0,Math.floor((areaW-tb2.w)/2)),0);
  let x0=areaX+Math.max(0,Math.floor((areaW-content)/2));
  if(vb){ bmBlit(m,vb,x0,destY+db.h-vb.h-1); x0+=vb.w; }
  bmBlit(m,db,x0,destY);
  if(rb) bmBlit(m,rb,Math.max(areaX,x0+db.w-rb.w),romY);
  // ドット描画
  const dot=6;
  const cv=document.createElement('canvas');
  cv.width=W*dot; cv.height=H*dot;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#141414'; ctx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    ctx.beginPath();
    ctx.arc(x*dot+dot/2, y*dot+dot/2, m.g[y][x]?dot/2-0.6:dot/2-1.8, 0, 6.284);
    ctx.fillStyle=m.g[y][x]?'#ff8c14':'#241a10';
    ctx.fill();
  }
  cv.style.flex='1'; cv.style.minWidth='0'; cv.style.width='100%'; cv.style.height='auto'; cv.style.display='block'; cv.style.borderRadius='4px';
  return cv;
}
async function mountLed(route, hs, rj){
  const box=document.getElementById('ledbox');
  if(!box) return;
  try{ await pmReady; }catch(e){}
  try{
    const cv=ledCanvas(route, hs, rj);
    box.insertBefore(cv, box.firstChild);
  }catch(e){
    console.warn('led canvas failed, fallback', e);
    const div=document.createElement('div');
    div.className='lmain';
    div.innerHTML='<div><span class="lvia">'+(hs.v?esc(hs.v)+' ':'')+'</span><span class="ldest">'+esc(hs.d)+'</span></div>'+(rj?'<div class="lromaji">'+esc(rj)+'</div>':'');
    box.insertBefore(div, box.firstChild);
  }
}

// ================== 地図 ==================
let lmapObj=null, lmapMarkers={};
function drawMap(spec){
  const el=document.getElementById('lmap');
  if(!el || !spec) return;
  if(!window.L){ el.innerHTML='<div class="small" style="padding:20px">'+t('needsnet')+'</div>'; return; }
  if(lmapObj){ lmapObj.remove(); lmapObj=null; }
  const m=L.map(el,{
    gestureHandling:true,
    gestureHandlingOptions:{duration:1500, text:{
      touch:t('gtouch'), scroll:t('gscroll'), scrollMac:t('gscrollmac')
    }}
  });
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19, attribution:'&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors'}).addTo(m);
  const pts=[];
  lmapMarkers={};
  spec.markers.forEach(mk=>{
    pts.push([mk.lat,mk.lon]);
    const mo=L.marker([mk.lat,mk.lon],{icon:L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],
      html:'<div style="background:'+mk.color+';color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:15px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)">'+mk.label+'</div>'
    })}).addTo(m).bindPopup(mk.popup);
    if(mk.pi!==undefined) lmapMarkers[mk.pi]=mo;
  });
  if(spec.user){
    pts.push(spec.user);
    L.marker(spec.user,{icon:L.divIcon({className:'',iconSize:[90,42],iconAnchor:[45,14],
      html:'<div style="text-align:center"><div style="background:#1a6fd4;border-radius:50%;width:16px;height:16px;margin:0 auto;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div><div style="color:#1a6fd4;font-weight:bold;font-size:12px;text-shadow:0 0 3px #fff,0 0 3px #fff">'+t('mehere')+'</div></div>'
    })}).addTo(m);
  }
  m.fitBounds(pts,{padding:[40,40],maxZoom:17});
  lmapObj=m;
}

// ================== 目印（OpenStreetMap Overpass API） ==================
const lmCache=JSON.parse(localStorage.getItem('lmCache3')||'{}');
const OVERPASS=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
async function annotate(poleIdxs){
  const need=poleIdxs.filter(i=>!(String(i) in lmCache));
  need.forEach(i=>{const el=document.getElementById('lm'+i); if(el) el.textContent='　'+t('lmsearch');});
  if(need.length){
    let q='[out:json][timeout:10];(';
    need.forEach(i=>{const s=GD.stops[i];
      q+='nwr(around:80,'+s[1]+','+s[2]+')["name"]["shop"];';
      q+='nwr(around:80,'+s[1]+','+s[2]+')["name"]["amenity"]["amenity"!~"parking|vending_machine|bicycle_parking|toilets|waste_basket"];';
    });
    q+=');out center tags;';
    let j=null;
    for(const ep of OVERPASS){
      try{
        const r=await fetch(ep,{method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:'data='+encodeURIComponent(q)});
        if(!r.ok){ console.warn('overpass status',r.status,ep); continue; }
        j=await r.json(); break;
      }catch(e){ console.warn('overpass error',ep,e); }
    }
    if(!j){
      need.forEach(i=>{const el=document.getElementById('lm'+i); if(el) el.textContent='';});
      return;
    }
    need.forEach(i=>{
      const s=GD.stops[i];
      let best=null,bd=1e9;
      (j.elements||[]).forEach(e=>{
        const la=(e.lat!=null)?e.lat:(e.center&&e.center.lat);
        const lo=(e.lon!=null)?e.lon:(e.center&&e.center.lon);
        if(la==null||lo==null)return;
        const dd=dist(s[1],s[2],la,lo);
        if(dd<bd&&dd<=80){bd=dd;best=e;}
      });
      lmCache[String(i)]=best?{n:best.tags.name,ne:best.tags['name:en']||'',d:Math.round(bd)}:null;
    });
    localStorage.setItem('lmCache3',JSON.stringify(lmCache));
  }
  poleIdxs.forEach(i=>{
    const lm=lmCache[String(i)];
    const el=document.getElementById('lm'+i);
    if(!lm){ if(el&&el.textContent.indexOf(t('lmsearch'))>=0) el.textContent=''; return; }
    let nm=lm.n;
    if(lang!=='ja' && lm.ne) nm=lm.n+' ('+lm.ne+')';
    const txt=t(lm.d<=50?'lmnear':'lmnear2', nm);
    if(el) el.textContent='　'+txt;
    const mk=lmapMarkers[i];
    if(mk&&mk.getPopup()) mk.setPopupContent(mk.getPopup().getContent()+'<br>'+esc(txt));
  });
}
